name: merge-train

# yardmaster — the merge-train conductor (tools/yardmaster/). Each run builds the
# dependency DAG of the open PRs (catching stacked PRs), topologically orders the
# train, and reports the planned action per car (merge / update-branch / wait /
# block-conflict / hold-on-base).
#
# ADVISORY by default: this MVP runs `plan` only — it computes and publishes the
# train, but performs NO merges, rebases, labels, or commits. Graduating it to act
# (auto update-branch + merge opt-in `train:auto` PRs) is a follow-up that flips to
# `tick --enable` and widens `permissions` to contents/pull-requests: write.
on:
  schedule:
    - cron: "*/30 * * * *"       # every 30 min — re-plan the train
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Pure dry-run: prints the planned merge train for the current open PRs.
      # Guards cleanly (exits 0) if GITHUB_TOKEN/repo are somehow unset.
      - name: Plan the merge train (advisory — no writes)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 tools/yardmaster/yardmaster.py plan \
            --repo "${{ github.repository }}" | tee train.txt

      - name: Publish the train to the step summary
        if: always()
        run: |
          echo "## merge-train (advisory plan)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat train.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no plan produced)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Telegram on failure
        if: failure()
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ merge-train (yardmaster) failed on ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
