name: merge-train

# yardmaster — the merge-train conductor (tools/yardmaster/), GRADUATED to act.
# Each run builds the dependency DAG of the open PRs (catching stacked PRs),
# topo-orders the train, performs ONE action on the head car (merge / update-branch
# / block-conflict / hold), and ALWAYS broadcasts the train as `yardmaster:<repo>`
# to Mastodon (compressed, EXIF-tagged, Ed25519-signed infographic) and Telegram.
#
# SECURITY: the active conductor runs ONLY on TRUSTED events (schedule +
# workflow_dispatch) — NEVER `pull_request`. A pull_request run checks out the
# PR's code, and this job holds write permissions + social/signing secrets, so
# executing PR-supplied code here would be a secret-exfil / arbitrary-merge hole
# (the classic pwn-request). Hourly cron + manual dispatch cover the train.
#
# SAFETY: it only acts on OPT-IN PRs (the `train:auto` label or a fleet author —
# tools/yardmaster/yardmaster.py FLEET_AUTHORS). Every other PR is reported but
# never touched. Conflicts (`dirty`) are flagged for a human, never auto-resolved.
on:
  schedule:
    - cron: "0 */3 * * *"       # every 3h (was hourly; small-team cadence)
  workflow_dispatch: {}

# Acting on PRs needs write; ci_state() reads the check-runs API.
permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:                     # never run two conductors at once (single-writer)
  group: merge-train
  cancel-in-progress: false

jobs:
  conduct:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Image toolchain for the Mastodon infographic: rsvg (SVG→PNG), pngquant
      # (compress), exiftool (metadata/EXIF). All best-effort — a missing tool
      # degrades the picture (text-only / uncompressed / untagged), never fails.
      - name: Install image toolchain
        run: sudo apt-get update -q && sudo apt-get install -y -q librsvg2-bin pngquant libimage-exiftool-perl fonts-dejavu-core

      - name: Conduct the train (act on opt-in PRs + always broadcast)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_VISIBILITY: ${{ secrets.MASTODON_VISIBILITY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          YARDMASTER_SIGNING_KEY: ${{ secrets.YARDMASTER_SIGNING_KEY }}
        run: |
          python3 tools/yardmaster/yardmaster.py tick --enable \
            --repo "${{ github.repository }}" | tee tick.json

      - name: Publish the tick to the step summary
        if: always()
        run: |
          echo "## merge-train (yardmaster · active)" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat tick.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no output)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # Backstop: yardmaster posts its own report each run; this only fires if the
      # tick itself crashed before broadcasting.
      - name: Notify Telegram on failure
        if: failure()
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ merge-train (yardmaster) crashed on ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
