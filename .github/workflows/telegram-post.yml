name: telegram-post
# Posts .github/social/telegram.txt to the configured Telegram chat/channel
# whenever that file changes. Lets agents publish updates by committing the
# message text — the bot token never leaves the runner.
# workflow_dispatch can't fire from a feature branch, so push+paths triggered.
on:
  push:
    branches: ["**"]
    paths:
      - ".github/social/telegram.txt"
      - ".github/workflows/telegram-post.yml"
permissions:
  contents: read
jobs:
  post:
    runs-on: ubuntu-latest
    environment: ci   # TELEGRAM_TOKEN + TELEGRAM_TO live in the `ci` Environment
    steps:
      - uses: actions/checkout@v6

      - name: Read and validate message
        id: msg
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          [ -n "$TOKEN" ] || { echo "::error::TELEGRAM_TOKEN secret unset"; exit 1; }
          f=.github/social/telegram.txt
          [ -s "$f" ] || { echo "::notice::telegram.txt empty — nothing to post"; echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0; }
          {
            echo "content<<TG_EOF"
            cat "$f"
            echo "TG_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Post to Telegram
        if: steps.msg.outputs.skip != 'true'
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: ${{ steps.msg.outputs.content }}
          format: text

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ telegram-post workflow failed on ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
