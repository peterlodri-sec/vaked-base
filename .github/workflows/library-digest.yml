name: library-digest
on:
  workflow_dispatch:
    inputs:
      topic: {description: 'Topic (blank = auto)', required: false, default: ''}
  schedule: [{cron: '0 10 * * 1'}]
permissions: {contents: read, issues: write}
jobs:
  digest:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: {python-version: '3.12'}
      - name: Mint GitHub App token
        id: ghapp
        uses: ./.github/actions/ghapp-token
        with:
          app-id: ${{ secrets.VAKED_CI_APP_ID }}
          private-key: ${{ secrets.VAKED_CI_APP_PRIVATE_KEY }}
      - name: Generate library digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ steps.ghapp.outputs.token }}
          TOPIC: ${{ github.event.inputs.topic }}
        run: python3 .github/scripts/library-digest.py
