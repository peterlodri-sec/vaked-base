name: ci-gate

# CI gate — Python tests for vakedc compiler + test suite
# Runs only when Python source or tests change (not on docs, configs, or other languages)
on:
  pull_request:
    paths:
      - 'vakedc/**'
      - 'tests/spec/**'
      - 'tests/corpus/**'
      - 'pyproject.toml'
      - '.github/workflows/ci-gate.yml'
  workflow_dispatch:
permissions: { contents: read }
concurrency:
  group: ci-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
jobs:
  gate:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff

      - name: Lint with ruff
        run: ruff check vakedc/ --select E,F,I

      - name: Run tests
        run: |
          python -m pytest tests/spec/ -v --cov=vakedc --cov-report=term-missing
          echo "CI gate — PASS"
