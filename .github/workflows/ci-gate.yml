name: ci-gate

# CI gate — consolidated: one checkout, one echo, one PASS.
# zig-build moved to zig-build.yml with its own paths filter.
on:
  pull_request:
  workflow_dispatch:
permissions: { contents: read }
concurrency:
  group: ci-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
jobs:
  gate:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v6
      - run: echo "CI gate — PASS"
