name: ci-gate

# Smart CI gate: classify the PR by size label or diff stats, then run only
# the tests that matter. Replaces the flat "run everything" pattern.
#
# Tiers (label wins over auto-detection):
#   smoke    size/chore, size/tiny   — 3 grammar+doc tests  (<60s)
#   standard size/small, size/targeted, size/medium
#                                    — 7 core compiler tests (~3 min)
#   full     size/big                — all 14 spec tests     (~8 min)
#   extended size/ultra              — full + nix-check      (~20 min)
#   BLOCKED  ping-owner              — posts warning, all jobs skipped
#
# Auto-detection (no size label):
#   ≤20 LOC + only docs/config → smoke
#   ≤100 LOC                  → standard
#   ≤400 LOC                  → full
#   >400 LOC                  → extended
#
# `ci-gate` (aggregator) is the only REQUIRED check. Individual test jobs
# are informational; skipped jobs are neutral.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      tier:
        description: "Override tier (smoke|standard|full|extended)"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write   # to post ping-owner warning comment

concurrency:
  group: ci-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # ─── 1. Classify ──────────────────────────────────────────────────────────
  classify:
    name: classify
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      tier:            ${{ steps.run.outputs.tier }}
      changed_groups:  ${{ steps.run.outputs.changed_groups }}
      ping_owner:      ${{ steps.run.outputs.ping_owner }}
      run_nix_parse:   ${{ steps.run.outputs.run_nix_parse }}
      run_nix_check:   ${{ steps.run.outputs.run_nix_check }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify PR
        id: run
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          BASE_SHA:  ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:  ${{ github.event.pull_request.head.sha }}
          # Manual dispatch override
          TIER_OVERRIDE: ${{ inputs.tier }}
        run: |
          python3 .github/scripts/ci_classify.py
          # Honour manual dispatch override
          if [ -n "$TIER_OVERRIDE" ]; then
            echo "tier=$TIER_OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "::notice::tier overridden to $TIER_OVERRIDE via workflow_dispatch"
          fi

  # ─── 2. Ping-owner block (advisory — does not block merge by itself) ───────
  ping-owner:
    name: ping-owner
    needs: classify
    if: needs.classify.outputs.ping_owner == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    environment: ci
    steps:
      - name: Post warning comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL:   ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" \
            --body "⚠️ **ping-owner**: this PR has the \`ping-owner\` label. CI smoke still runs, but please review before merging." \
            2>/dev/null || true

      - name: Telegram alert
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.1
        with:
          to:     ${{ secrets.TELEGRAM_TO }}
          token:  ${{ secrets.TELEGRAM_TOKEN }}
          format: text
          message: |
            ⚠️ ping-owner on PR ${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.html_url }}

  # ─── 3. Smoke suite (always runs unless ping-owner) ───────────────────────
  smoke:
    name: smoke
    needs: classify
    if: needs.classify.outputs.ping_owner != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Smoke suite (grammar + examples + doc_links)
        run: python3 tests/smoke.py

      - name: Publish to step summary
        if: always()
        run: |
          echo "## Smoke suite (tier: ${{ needs.classify.outputs.tier }})" >> "$GITHUB_STEP_SUMMARY"
          echo "changed_groups: \`${{ needs.classify.outputs.changed_groups }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─── 4. Standard suite (standard | full | extended) ───────────────────────
  standard:
    name: standard
    needs: classify
    if: |
      needs.classify.outputs.ping_owner != 'true' &&
      contains(fromJson('["standard","full","extended"]'), needs.classify.outputs.tier)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Standard suite (grammar + core compiler, 7 tests)
        run: python3 tests/spec/run_all.py --tier standard

  # ─── 5. Full suite (full | extended) ──────────────────────────────────────
  full:
    name: full
    needs: classify
    if: |
      needs.classify.outputs.ping_owner != 'true' &&
      contains(fromJson('["full","extended"]'), needs.classify.outputs.tier)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Full spec suite (all 14 tests)
        run: |
          python3 tests/spec/run_all.py | tee spec-out.txt
          exit ${PIPESTATUS[0]}

      - name: ralph unit tests
        run: python3 tools/ralph/test_ralph.py

      - name: Publish to step summary
        if: always()
        run: |
          echo "## Full spec suite" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat spec-out.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ─── 6. Nix parse (when nix paths changed OR tier >= full) ────────────────
  nix-parse:
    name: nix-parse
    needs: classify
    if: |
      needs.classify.outputs.ping_owner != 'true' &&
      needs.classify.outputs.run_nix_parse == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Parse-check flake.nix (no build, no fetch)
        run: |
          nix-instantiate --parse flake.nix
          nix-instantiate --parse vaked/examples/lowering/flake.nix

  # ─── 7. Nix full check (extended AND nix paths changed) ───────────────────
  nix-check:
    name: nix-check
    needs: classify
    if: |
      needs.classify.outputs.ping_owner != 'true' &&
      needs.classify.outputs.run_nix_check == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ci
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: nix flake check (evaluate all outputs, no build)
        id: flakecheck
        run: |
          set -o pipefail
          nix flake check --no-build 2>&1 | tee nix-check.log

      - name: Publish to step summary
        if: always()
        run: |
          echo "## nix flake check" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 80 nix-check.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no log)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Telegram report
        if: always()
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.1
        with:
          to:     ${{ secrets.TELEGRAM_TO }}
          token:  ${{ secrets.TELEGRAM_TOKEN }}
          format: text
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} nix-check: ${{ job.status }} on ${{ github.event.pull_request.number && format('PR #{0}', github.event.pull_request.number) || github.ref_name }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ─── 8. Agent-structure guard (revert protection — part of the required gate) ─
  # Fails a PR that silently reverts a landed agent refactor (re-monolithizing a
  # crate's main.rs, re-inlining setup_tracing over the shared vaked_telemetry
  # crate, or deleting module files). Runs from inside the required gate so the
  # block is enforced, not advisory. No-ops cheaply for PRs that don't touch agents.
  agent-guard:
    name: agent-guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the PR base commit is available to diff against.
          fetch-depth: 0
      - name: Guard against agent-refactor reverts
        run: bash tools/ci/agent-structure-guard.sh "${{ github.event.pull_request.base.sha }}"

  # ─── 9. Gate aggregator (the only REQUIRED check) ─────────────────────────
  ci-gate:
    name: ci-gate
    needs: [classify, smoke, standard, full, nix-parse, nix-check, agent-guard]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Evaluate results
        env:
          TIER:         ${{ needs.classify.outputs.tier }}
          PING_OWNER:   ${{ needs.classify.outputs.ping_owner }}
          SMOKE:        ${{ needs.smoke.result }}
          STANDARD:     ${{ needs.standard.result }}
          FULL:         ${{ needs.full.result }}
          NIX_PARSE:    ${{ needs.nix-parse.result }}
          NIX_CHECK:    ${{ needs.nix-check.result }}
          AGENT_GUARD:  ${{ needs.agent-guard.result }}
        run: |
          echo "tier:        $TIER"
          echo "ping_owner:  $PING_OWNER"
          echo "smoke:       $SMOKE"
          echo "standard:    $STANDARD"
          echo "full:        $FULL"
          echo "nix-parse:   $NIX_PARSE"
          echo "nix-check:   $NIX_CHECK"
          echo "agent-guard: $AGENT_GUARD"

          if [ "$PING_OWNER" = "true" ]; then
            echo "::warning::ping-owner label set — human review required before merge"
            # Do NOT exit 1; the label itself is informational; owner decides.
          fi

          FAIL=0
          for job_result in "$SMOKE" "$STANDARD" "$FULL" "$NIX_PARSE" "$NIX_CHECK" "$AGENT_GUARD"; do
            if [ "$job_result" = "failure" ]; then
              FAIL=1
            fi
          done

          if [ "$FAIL" = "1" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

          echo "ci-gate passed (tier=$TIER)"
          echo "## ci-gate: ✅ $TIER" >> "$GITHUB_STEP_SUMMARY"
          echo "| job | result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| smoke | $SMOKE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| standard | $STANDARD |" >> "$GITHUB_STEP_SUMMARY"
          echo "| full | $FULL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| nix-parse | $NIX_PARSE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| nix-check | $NIX_CHECK |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agent-guard | $AGENT_GUARD |" >> "$GITHUB_STEP_SUMMARY"
