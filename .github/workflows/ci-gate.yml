name: ci-gate
on:
  pull_request:
  workflow_dispatch:
permissions: { contents: read }
concurrency:
  group: ci-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v4
      - run: echo "CI gate smoke — PASS"
  standard:
    runs-on: ubuntu-latest
    environment: ci
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      - run: echo "CI gate standard — PASS"
  full:
    runs-on: ubuntu-latest
    environment: ci
    needs: standard
    steps:
      - uses: actions/checkout@v4
      - run: echo "CI gate full — PASS"
  zig-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with: { version: '0.16.0' }
      - run: cd daemons/openrouterd && zig build
