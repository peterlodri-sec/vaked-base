name: Optimizer — ultra-compress before sign

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      rounds:
        description: 'Compression rounds (5-10)'
        default: '7'

jobs:
  compress:
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          
      - name: Run Optimizer
        run: bash tools/optimizer/compress.sh
        env:
          OPTIMIZER_ROUNDS: ${{ github.event.inputs.rounds || '7' }}
          
      - name: Dogfeed — push if changes
        if: success()
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "vaked-optimizer[bot]"
            git config user.email "optimizer@vaked.dev"
            git add -A
            git commit -m "optimize: ultra-compress $ROUNDS rounds [skip ci]"
            git push
          fi
          
      - name: Dogfeed — verify builds
        if: success()
        run: |
          cd tools/openrouter-ts && npm install && npm run build || echo "TS build: check manually"
          
      - name: Notify Telegram
        if: failure()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "Optimizer failed on ${{ github.event.pull_request.html_url }}"
