name: Optimizer — verify before sign

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify builds
        run: |
          cd tools/openrouter-ts && npm install && npm run build || echo "TS build: check manually"
          
      - name: Notify Telegram
        if: failure()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "Optimizer verify failed on ${{ github.event.pull_request.html_url }}"
