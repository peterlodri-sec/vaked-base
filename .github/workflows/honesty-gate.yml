name: honesty-gate
on:
  push: { branches: [main] }
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "GENESIS_SEAL: 7c242080"
          if grep -rq "7c242080" . --include='*.md' --include='*.zig' --include='*.ts'; then
            echo "✅ Genesis seal verified"
          else
            echo "⚠️  Genesis seal not found — not blocking"
          fi
