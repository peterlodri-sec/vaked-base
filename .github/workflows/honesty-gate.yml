name: honesty-gate

# The external POV. A system cannot verify its own honesty from within — so CI,
# which is not the artifact, does it. Declaring a norm does not implement it;
# this workflow does. Fails the build on a broken seal or an unreconciled claim.
#
# Hardened after the gate-breaker audit:
#   - NO paths: filter — the job always runs, so a dishonest claim cannot evade
#     it by living in an unscoped file (workflow-pathfilter bypass).
#   - trusted-root execution — the verifier scripts are run from the MERGED main
#     branch against the PR's tree, so a PR cannot neuter its own gate
#     (gate-self-modify bypass).
#
# NOTE (GitHub-side, cannot be set from in-tree — see REPAIR_AUDIT.json):
#   mark `honesty-gate` a REQUIRED status check on main + enable branch protection,
#   else a red run does not block merge.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  honesty-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR tree (the artifacts under test)
        uses: actions/checkout@v4
        with:
          path: pr
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout trusted main (the verifier of record)
        uses: actions/checkout@v4
        with:
          ref: main
          path: trusted
          fetch-depth: 0
          fetch-tags: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify external seals — trusted verifier vs PR artifacts (failable)
        run: HONESTY_REPO_ROOT="$GITHUB_WORKSPACE/pr" bash trusted/oss/honesty-gate/verify-seals.sh

      - name: Reconcile divergence claims with anomaly ledger — Norm #4
        run: HONESTY_REPO_ROOT="$GITHUB_WORKSPACE/pr" python3 trusted/oss/honesty-gate/reconcile-gate.py
