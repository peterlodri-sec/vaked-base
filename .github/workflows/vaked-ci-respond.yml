name: vaked-ci-respond

# Interactive responder: when a trusted maintainer mentions `@vaked-ci` in a PR
# comment, the pr-review agent (in `--respond` mode) answers the request — a
# question about the diff, or `review`/`re-review` to post a fresh review. Advisory
# only (posts a comment; no code changes). Reuses the prebuilt pr-review binary.
on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vaked-ci-respond-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  respond:
    runs-on: [self-hosted, linux, hetzner]
    # Only on PR comments that mention @vaked-ci, from a human, by someone with
    # write-ish association. issue_comment runs from the default branch with repo
    # secrets regardless of commenter, so the author_association gate is the key
    # control against cost-abuse and self-trigger loops.
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@vaked-ci') &&
      github.event.comment.user.type != 'Bot' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    environment: ci
    timeout-minutes: 15
    env:
      CRABCC_INSTALL_TOKEN: ${{ secrets.CRABCC_INSTALL_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Fast path: the rolling prebuilt agent (no compile). Falls through to a
      # source build if the asset is missing.
      - name: Download prebuilt agent
        id: prebuilt
        continue-on-error: true
        run: |
          gh release download pr-review-bin \
            --pattern vaked-pr-review-linux-x86_64 \
            --output ./vaked-pr-review
          chmod +x ./vaked-pr-review

      - name: Install Rust toolchain
        if: steps.prebuilt.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        if: steps.prebuilt.outcome == 'failure'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vaked-agents/ci/pr-review
      - name: Set up sccache
        if: steps.prebuilt.outcome == 'failure'
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Set up mold linker
        if: steps.prebuilt.outcome == 'failure'
        uses: rui314/setup-mold@v1

      # Reuse the crabcc symbol index across runs (optional; needs a PAT).
      - name: Cache crabcc index
        uses: actions/cache@v5
        with:
          path: .crabcc
          key: crabcc-index-${{ github.repository }}
          restore-keys: crabcc-index-
      - name: Cache crabcc binary (v6.5.1)
        id: crabcc-bin-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/crabcc
          key: crabcc-bin-v6.5.1-${{ runner.os }}
      - name: Install crabcc v6.5.1 (optional)
        if: ${{ env.CRABCC_INSTALL_TOKEN != '' && steps.crabcc-bin-cache.outputs.cache-hit != 'true' }}
        run: |
          git config --global url."https://x-access-token:${CRABCC_INSTALL_TOKEN}@github.com/".insteadOf "https://github.com/"
          CARGO_NET_GIT_FETCH_WITH_CLI=true \
            cargo install --git https://github.com/crabcc-labs/crabcc --tag v6.5.1 crabcc-cli --force || \
            echo "crabcc install failed — assistant will answer diff-only"

      - name: Resolve PR head/base SHAs
        run: |
          shas=$(gh pr view "${{ github.event.issue.number }}" --repo "${GITHUB_REPOSITORY}" \
            --json headRefOid,baseRefOid -q '.baseRefOid + " " + .headRefOid')
          echo "BASE_SHA=${shas% *}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${shas#* }" >> "$GITHUB_ENV"

      - name: Respond
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Model is config, not baked into the binary (see pr-review.yml).
          PR_REVIEW_MODEL: anthropic/claude-haiku-4-5
          # Self-hosted Langfuse (see pr-review.yml). Agent builds the OTLP Basic token
          # from the public/secret key pair; legacy LANGFUSE_URL/API_KEY still accepted.
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PROJECT_ID: ${{ secrets.LANGFUSE_PROJECT_ID }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if [ -x ./vaked-pr-review ]; then
            echo "::notice::using prebuilt agent (no compile)"
            ./vaked-pr-review --respond --repo "${GITHUB_REPOSITORY}" --pr "${PR_NUMBER}"
          else
            echo "::notice::prebuilt unavailable — building from source"
            if command -v sccache >/dev/null; then
              export RUSTC_WRAPPER=sccache SCCACHE_GHA_ENABLED=true
            fi
            probe() { printf 'int main(){return 0;}' > "$RUNNER_TEMP/ld.c" && cc -fuse-ld="$1" "$RUNNER_TEMP/ld.c" -o "$RUNNER_TEMP/ld.out" 2>/dev/null; }
            FUSE=""; for c in mold lld wild; do probe "$c" && FUSE="$c"; done
            FLAGS="-C target-cpu=x86-64-v3 -C symbol-mangling-version=v0"
            [ -n "$FUSE" ] && FLAGS="$FLAGS -C link-arg=-fuse-ld=$FUSE -C link-arg=-Wl,--icf=all"
            export RUSTFLAGS="$FLAGS"
            cargo run --release --manifest-path vaked-agents/ci/pr-review/Cargo.toml -- \
              --respond --repo "${GITHUB_REPOSITORY}" --pr "${PR_NUMBER}"
          fi

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ vaked-ci-respond failed on PR #${{ github.event.issue.number }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
