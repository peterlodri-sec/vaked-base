name: CI-Keeper
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
jobs:
  respond:
    if: contains(github.event.comment.body, '@vaked-ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash .github/ci-keeper/handle.sh "${{ github.event.comment.body }}"
      - if: failure()
        run: echo "CI-Keeper failed"
