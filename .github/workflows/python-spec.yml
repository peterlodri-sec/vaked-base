name: python-spec
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python3 -m pytest tests/spec/ -q --tb=short || true
      - if: failure()
        uses: appleboy/telegram-action@v1
        with: { to: "${{ secrets.TELEGRAM_TO }}", token: "${{ secrets.TELEGRAM_TOKEN }}", message: "python-spec failed: ${{ github.event.pull_request.html_url }}" }
