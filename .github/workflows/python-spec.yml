name: python-spec
on: [pull_request, push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: python3 -c "import ast; [ast.parse(open(f).read()) for f in ['vakedc/parser.py','tools/ralph/ralph.py','tests/spec/test_vakedc_check.py']]; print('OK')"
