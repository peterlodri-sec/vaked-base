name: provost-build

# Bakes the provost agent binary once and publishes it as a rolling GitHub
# Release asset (tag `provost-bin`). The provost workflow downloads this instead
# of compiling on every trigger, avoiding cold start. Runs when the crate changes
# on main, or on demand.
on:
  push:
    branches: [main]
    paths:
      - vaked-agents/ci/provost/**
      - .github/workflows/provost-build.yml
  workflow_dispatch:

permissions:
  contents: write   # create/update the rolling release + upload asset

concurrency:
  group: provost-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, linux, hetzner]
    timeout-minutes: 30
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vaked-agents/ci/provost

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set up mold linker
        uses: rui314/setup-mold@v1

      # Best-effort: install wild linker (fastest on supported cc).
      - name: Set up wild linker (preferred)
        continue-on-error: true
        run: |
          cargo install --locked wild-linker
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(command -v wild)" "$HOME/.local/bin/ld.wild"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install UPX
        run: sudo apt-get install -y upx-ucl

      - name: Build release binary
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
        run: |
          # Fastest linker that actually links with this cc (gcc rejects 'wild'
          # even when ld.wild is on PATH, so probe with a real test link).
          probe() {
            printf 'int main(){return 0;}' > "$RUNNER_TEMP/ld.c" && \
            cc -fuse-ld="$1" "$RUNNER_TEMP/ld.c" -o "$RUNNER_TEMP/ld.out" 2>/dev/null
          }
          FUSE=""
          for c in mold lld wild; do probe "$c" && FUSE="$c"; done
          FLAGS="-C target-cpu=x86-64-v3 -C symbol-mangling-version=v0"
          if [ -n "$FUSE" ]; then
            echo "::notice::linking with $FUSE"
            # No -Wl,--icf=all: identical-code-folding yields a GNU hash table
            # UPX 4.2.2 can't pack (CantPackException: bad DT_GNU_HASH n_bucket=0x1).
            FLAGS="$FLAGS -C link-arg=-fuse-ld=$FUSE"
          else
            echo "::notice::no fast linker accepted by cc — using default"
          fi
          export RUSTFLAGS="$FLAGS"
          cargo build --release \
            --manifest-path vaked-agents/ci/provost/Cargo.toml
          cp vaked-agents/ci/provost/target/release/vaked-provost \
             vaked-provost-linux-x86_64

      - name: Compress binary with UPX (best-effort)
        # UPX 4.2.2 can't pack mold's single-bucket .gnu.hash (CantPackException:
        # bad DT_GNU_HASH n_bucket=0x1). Don't fail the build on it — ship the
        # binary uncompressed when UPX can't pack it.
        run: upx --best vaked-provost-linux-x86_64 || echo "::warning::UPX could not pack the binary; shipping uncompressed"

      - name: Publish rolling release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the rolling release exists, then clobber the asset in place.
          gh release view provost-bin >/dev/null 2>&1 || \
            gh release create provost-bin \
              --title "Provost agent (prebuilt)" \
              --notes "Rolling prebuilt linux-x86_64 binary of vaked-agents/ci/provost. Auto-updated from main." \
              --prerelease
          gh release upload provost-bin vaked-provost-linux-x86_64 --clobber

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to:      ${{ secrets.TELEGRAM_TO }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ provost-build failed on ${{ github.ref_name }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
