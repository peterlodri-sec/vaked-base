name: nocturne

# nocturne (Python orchestrator + Vast.ai GPU): a nightly, abstain-by-default auto-researcher.
# Rents a single GPU, runs Karpathy's autoresearch mutate->train->keep/discard loop, ALWAYS tears
# the box down (watch-and-destroy), and escalates ONLY a re-run-confirmed, novel val_bpb win — by
# opening an `agent` issue and workflow_dispatch-ing swe-af.yml, then posting inline. Else: silent.
# GPU dollars are the dominant risk, so manual runs are DOUBLE-CONFIRMED and the first manual
# dispatch defaults to a no-spend dry run. See tools/nocturne/README.md.
#
# Triggers:
#   • schedule  — automated nightly run (trusted; no approval).
#   • dispatch  — DOUBLE-CONFIRMED manual run:
#       (1) type `confirm: RUN` (typed gate), and
#       (2) the `nocturne-manual` Environment's required-reviewer approval (a second human click)
#           must be granted before ANY spend.
on:
  schedule:
    - cron: "0 2 * * *" # nightly, 02:00 UTC (clear of optitron 05:33, fleet-introspect 06:00)
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type RUN to confirm a manual night (first of two confirmations)"
        type: string
        required: true
        default: ""
      dry_run:
        description: "no-spend: print the provision plan + run the DRY_ACT pipeline, rent nothing"
        type: boolean
        default: true
      max_minutes:
        description: "hard self-destruct deadline for the rented box (cost cap)"
        type: string
        default: "150"
      max_dph:
        description: "max $/hr bid for the GPU (abort if nothing under it)"
        type: string
        default: "3.0"

permissions:
  contents: write # commit the hash-chained ledger + promoted baseline
  issues: write # open the `agent` swe_af hand-off issue
  actions: write # workflow_dispatch swe-af.yml (the gate-satisfying hand-off)

concurrency:
  group: nocturne
  cancel-in-progress: false # serialize: single writer to the append-only ledger

jobs:
  # Confirmation #2 for manual runs: protected `nocturne-manual` Environment ⇒ GitHub pauses for
  # required-reviewer approval BEFORE any provisioning. Skipped for scheduled runs and for manual
  # runs whose typed confirmation (#1) is not exactly RUN.
  approve:
    if: github.event_name == 'workflow_dispatch' && inputs.confirm == 'RUN'
    runs-on: ubuntu-latest
    environment: nocturne-manual
    timeout-minutes: 60
    steps:
      - run: echo "::notice::nocturne manual run confirmed (RUN) and approved — actor=${{ github.actor }}, dry_run=${{ inputs.dry_run }}"

  night:
    needs: [approve]
    if: >-
      always() &&
      ( github.event_name == 'schedule'
        || (github.event_name == 'workflow_dispatch' && needs.approve.result == 'success') )
    runs-on: ubuntu-latest
    environment: ci # VAST_API_KEY / OPENROUTER_API_KEY live in the `ci` Environment
    timeout-minutes: 360 # 6h ceiling; the box's own watch-and-destroy is the real cap
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guard — require GPU + LLM keys
        id: guard
        env:
          VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "mode=dry" >> "$GITHUB_OUTPUT"; echo "::notice::dry-run — no spend"; exit 0
          fi
          if [ -z "$VAST_API_KEY" ] || [ -z "$OPENROUTER_API_KEY" ]; then
            echo "mode=noop" >> "$GITHUB_OUTPUT"
            echo "::warning::missing VAST_API_KEY/OPENROUTER_API_KEY — nocturne disabled, no-op"
          else
            echo "mode=real" >> "$GITHUB_OUTPUT"
          fi

      - name: Install vastai CLI
        if: steps.guard.outputs.mode != 'noop'
        run: pipx install vastai || pip install --user vastai

      - name: Run nocturne (dry)
        if: steps.guard.outputs.mode == 'dry'
        run: |
          bash tools/nocturne/provision.sh --dry-run rent
          NOCTURNE_DRY_ACT=1 python3 tools/nocturne/nocturne.py run

      - name: Run nocturne (real night)
        if: steps.guard.outputs.mode == 'real'
        env:
          VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL: ${{ vars.NOCTURNE_LLM_MODEL || 'deepseek/deepseek-chat' }}
          GPU_NAME: ${{ vars.NOCTURNE_GPU_NAME || 'H100_SXM' }}
          MAX_DPH: ${{ github.event.inputs.max_dph || '3.0' }}
          MAX_MINUTES: ${{ github.event.inputs.max_minutes || '150' }}
        run: python3 tools/nocturne/nocturne.py run

      - name: Commit ledger + promoted baseline
        if: always() && steps.guard.outputs.mode == 'real'
        run: |
          git config user.name "vaked-nocturne"
          git config user.email "nocturne@users.noreply.github.com"
          git add tools/nocturne/state/events.jsonl tools/nocturne/state/baseline 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "::notice::no ledger changes"
          else
            git commit -m "nocturne: night tick [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}" || echo "::warning::push failed"
          fi

      - name: Escalate a confirmed win → swe_af + announce
        if: always() && steps.guard.outputs.mode == 'real' && hashFiles('tools/nocturne/state/escalation-draft.md') != ''
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: |
          gh label create agent --color FBCA04 --description "hand-off to swe_af" 2>/dev/null || true
          TITLE=$(head -1 tools/nocturne/state/escalation-draft.md | sed 's/^# //')
          ISSUE_URL=$(gh issue create --title "$TITLE" --body-file tools/nocturne/state/escalation-draft.md --label agent)
          NUM=$(basename "$ISSUE_URL")
          echo "::notice::opened $ISSUE_URL — dispatching swe_af"
          gh workflow run swe-af.yml -f issue="$NUM" || echo "::warning::swe_af dispatch failed"

      - name: Announce inline (Telegram)
        if: always() && steps.guard.outputs.mode == 'real' && hashFiles('tools/nocturne/state/toot-draft.txt') != ''
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message_file: tools/nocturne/state/toot-draft.txt

      - name: Announce inline (Mastodon)
        if: always() && steps.guard.outputs.mode == 'real' && hashFiles('tools/nocturne/state/toot-draft.txt') != ''
        uses: cbrgm/mastodon-github-action@v2
        with:
          access-token: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          url: ${{ vars.MASTODON_URL || 'https://social.crabcc.app' }}
          message-file: tools/nocturne/state/toot-draft.txt

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ nocturne night failed\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
