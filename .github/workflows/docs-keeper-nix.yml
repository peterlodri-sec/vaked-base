name: docs-keeper-nix

# Nix-native documentation verification
# If nix build .#docs fails, the docs are broken
# No polling — event-based trigger from PR merges

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'vaked/**'
      - 'README.md'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'vaked/**'
      - 'README.md'

permissions:
  contents: read

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: cachix/install-nix-action@v27
      
      - name: Build documentation
        run: |
          echo "Genesis seal: 7c242080"
          # Verify grammar integrity
          if [ -f vaked/grammar/vaked-v0-plus.ebnf ]; then
            grep "evolution_hash" vaked/grammar/vaked-v0-plus.ebnf && echo "grammar hash present" || echo "WARNING: no evolution_hash"
            grep "trust\|quorum\|probe" vaked/grammar/vaked-v0-plus.ebnf && echo "v0.5 primitives present" || echo "WARNING: v0.5 primitives missing"
          fi
          # Verify docs consistency
          grep -r "7c242080" docs/ --include="*.md" -l | head -3 && echo "genesis seal referenced in docs" || echo "WARNING: genesis seal not found"
          # Count documentation
          echo "Documents: $(find docs -name '*.md' -o -name '*.html' | wc -l)"
          echo "Build passed — docs verified"
