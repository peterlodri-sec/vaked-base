name: Claude Code

# Responds to @claude mentions in issues and pull requests.
# Auth: Claude subscription OAuth token (no Anthropic API key / usage billing).
#   1. Run `claude setup-token` locally on a machine signed in to your
#      Claude Pro/Max account. It prints a long-lived OAuth token.
#   2. Add that token as a repository secret named CLAUDE_CODE_OAUTH_TOKEN
#      (GitHub -> Settings -> Secrets and variables -> Actions).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when the trigger phrase "@claude" is present, to avoid spending
    # turns on unrelated activity.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Subscription OAuth token instead of anthropic_api_key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          # Optional: pin a model and bound the turn budget.
          # claude_args: |
          #   --model claude-opus-4-8
          #   --max-turns 20
