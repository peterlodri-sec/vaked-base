name: Claude Code

# Responds to @claude mentions in issues and pull requests.
#
# Auth: Claude subscription OAuth token (no Anthropic API key / usage billing).
#   1. Run `claude setup-token` locally on a machine signed in to your
#      Claude Pro/Max account. It prints a long-lived OAuth token.
#   2. Add that token as a repository secret named CLAUDE_CODE_OAUTH_TOKEN
#      (GitHub -> Settings -> Secrets and variables -> Actions, "ci" environment).
#
# Security: this agent has write access (contents/PRs/issues) and runs from the
# default branch with repository secrets regardless of who triggers it. The
# author-association gate below is the key control: only the owner, org members,
# and collaborators can invoke it, and never another bot. Without this gate any
# stranger commenting "@claude" could drive a write-capable agent.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: >-
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.user.type != 'Bot' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.user.type != 'Bot' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        github.event.review.user.type != 'Bot' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
      ) || (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        github.event.issue.user.type != 'Bot' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      )
    runs-on: ubuntu-latest
    environment: ci
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Subscription OAuth token instead of anthropic_api_key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          # Sonnet only, by request. In-repo skills under .claude/skills
          # (including caveman) are auto-discovered and usable via /caveman.
          claude_args: |
            --model claude-sonnet-4-6
