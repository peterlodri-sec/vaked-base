name: Blogger — vaked.dev publisher
on:
  push:
    branches: [main]
    paths: ['blog/**']
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - run: bash tools/blogger/publish.sh
      - if: failure()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "Blogger failed"