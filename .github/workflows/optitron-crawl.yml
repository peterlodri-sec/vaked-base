name: optitron-crawl

# vaked-optitron (Go/Eino runtime): a daily, abstain-by-default crawler that surfaces ONE
# novel, proven, independently-confirmed compiler/allocator/zig/rust/vaked optimization — or
# nothing. On a finding it opens an `agent`-labelled issue (the swe_af trigger) and stages a
# Mastodon toot + Telegram message (the commit fires the post workflows). Advisory: guards on
# the API key and never fails anything. See tools/optitron/README.md.
#
# Triggers:
#   • schedule  — automated daily run (trusted; no approval).
#   • dispatch  — DOUBLE-CONFIRMED manual run:
#       (1) you must type `confirm: RUN` when dispatching (typed gate), and
#       (2) the `optitron-manual` Environment's required-reviewer approval must be granted
#           (a second human click) before any spend. See the README for the one-time setup.
on:
  # Schedule PAUSED to conserve OpenRouter credit (verify=opus-4.8, crawl=gpt-5.5:online
  # are the priciest per-run in the fleet). Re-enable by uncommenting when credit is
  # refilled; the double-confirmed manual workflow_dispatch still works meanwhile.
  # schedule:
  #   - cron: "33 5 * * *" # daily, 05:33 UTC
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RUN to confirm a manual crawl (first of two confirmations)'
        type: string
        required: true
        default: ""
      dry_run:
        description: "build prompts + cost estimate only (no network)"
        type: boolean
        default: false

permissions:
  contents: write # commit the hash-chained ledger + social staging files
  issues: write # open the `agent`-labelled swe_af hand-off issue

concurrency:
  group: optitron-crawl
  cancel-in-progress: false # serialize: single writer to the append-only ledger

jobs:
  # Confirmation #2 for manual runs: this job targets the protected `optitron-manual`
  # Environment, so GitHub pauses for the required-reviewer approval before it (and the
  # crawl that needs it) can proceed. Skipped entirely for scheduled runs, and skipped
  # for manual runs where the typed confirmation (#1) is not exactly RUN.
  approve:
    if: github.event_name == 'workflow_dispatch' && inputs.confirm == 'RUN'
    runs-on: ${{ vars.AGENT_RUNNER || 'ubuntu-latest' }}
    environment: optitron-manual
    timeout-minutes: 60
    steps:
      - run: echo "::notice::optitron manual run confirmed (RUN) and approved — actor=${{ github.actor }}"

  crawl:
    needs: [approve]
    # Run for a scheduled tick (approve is skipped), or for a manual run only once the
    # approval gate has succeeded. A wrong/empty confirm ⇒ approve skipped ⇒ no crawl.
    if: >-
      always() &&
      ( github.event_name == 'schedule'
        || (github.event_name == 'workflow_dispatch' && needs.approve.result == 'success') )
    runs-on: ${{ vars.AGENT_RUNNER || 'ubuntu-latest' }}
    environment: ci # OPENROUTER_API_KEY / LANGFUSE_* live in the `ci` Environment
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full tree so `git grep` novelty checks see everything

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: tools/optitron/go.sum

      # Toolchain for the micro-benchmark gate (cc ships on the runner; add rustc).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build optitron
        run: cd tools/optitron && go build -o "$RUNNER_TEMP/optitron" ./cmd/optitron

      - name: Ensure `agent` label exists
        run: |
          gh label create agent --color FBCA04 \
            --description "hand-off to the swe_af workflow" 2>/dev/null || true

      - name: Run optitron crawl
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          DRY=""; [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          "$RUNNER_TEMP/optitron" crawl --once --budget-total 4.0 $DRY

      - name: Commit ledger + any staged announcements
        if: always()
        run: |
          git config user.name "vaked-optitron"
          git config user.email "optitron@users.noreply.github.com"
          git add tools/optitron/state/events.jsonl .github/social/toot.txt .github/social/telegram.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "::notice::no ledger/announcement changes to commit"
          else
            git commit -m "optitron: crawl tick [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}" || echo "::warning::push failed"
          fi

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ optitron-crawl failed\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
