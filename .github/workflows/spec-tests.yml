name: spec-tests

# Runs the executable spec-test harness (tests/spec/) that builds recognizers from
# the on-disk EBNF grammars and checks every example derives, plus the lowering
# fixtures and doc links. Primary trigger: every version/tag bump (push of a v* tag).
#
# The jobs run in parallel for faster feedback:
#   python-spec  — the Python stdlib harness (grammar/examples/lowering/doc-links)
#   nix-parse    — parse-only check of flake.nix fixtures (no build, no network)
#   nix-check    — `nix flake check` of the ROOT flake: evaluates every output incl.
#                  nixosConfigurations.vakedos (catches module/option errors that
#                  parse-only misses). Sends a VERBOSE Telegram report every run
#                  (success and failure), not just on failure.
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'hosts/**'
      - 'nix/**'
      - 'vaked/**'
      - 'tests/**'
      - 'tools/**'
      - 'eventd/**'
      - '.github/workflows/spec-tests.yml'
  pull_request:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'hosts/**'
      - 'nix/**'
      - 'vaked/**'
      - 'tests/**'
      - 'tools/**'
      - 'eventd/**'
      - '.github/workflows/spec-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pin Python for determinism (the harness is stdlib-only; system python3 would
      # also work, but a pinned version keeps CI reproducible).
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run spec-test harness
        run: |
          python3 tests/spec/run_all.py | tee spec-out.txt
          exit ${PIPESTATUS[0]}

      # The ralph driver's unit suite (stdlib-only, offline — every network call
      # is mocked). Guards the immutable event-log invariants (hash-chain, O(1)
      # fsynced append, boot verify/repair) + flat-cost windowing (#57/#58).
      - name: Run ralph unit tests
        run: python3 tools/ralph/test_ralph.py

      - name: Publish spec results to step summary
        if: always()
        run: |
          echo "## spec-tests" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat spec-out.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ spec-tests (python-spec) failed on ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  optitron-go:
    # vaked-optitron's Go (Eino) suite: the single-writer hash-chained ledger
    # (incl. a concurrent-append race test), the deterministic gate, and a real
    # compiled C micro-benchmark. Offline — no OpenRouter calls.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: tools/optitron/go.sum

      - name: go vet + test (race)
        run: |
          cd tools/optitron
          test -z "$(gofmt -l .)" || { echo "::error::gofmt"; gofmt -l .; exit 1; }
          go vet ./...
          go test -race ./...

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ spec-tests (optitron-go) failed on ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  nix-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Parse-only Nix check of the flake fixtures. nix-instantiate --parse never
      # builds or fetches, so the fixtures' placeholder revs are never resolved.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Parse-check flake.nix fixtures (parse only — no build, no fetch)
        run: |
          nix-instantiate --parse flake.nix
          nix-instantiate --parse vaked/examples/lowering/flake.nix

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ spec-tests (nix-parse) failed on ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  nix-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The nix-installer enables flakes + the unified `nix` CLI by default.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      # Backs the Nix store with GitHub Actions cache so nixpkgs/disko tarballs
      # are served from cache on subsequent runs instead of re-fetched from GitHub.
      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      # Real EVALUATION check of the root flake: every output (devShells, formatter,
      # and crucially nixosConfigurations.vakedos — the host config) must evaluate.
      #   --no-build   evaluate, don't realize: still instantiates the vakedos
      #                toplevel derivation graph but never builds anything.
      # Checks only x86_64-linux (the runner's native system) — no --all-systems,
      # which would multiply evaluation 4× across darwin/aarch64 for no CI benefit.
      # nixosConfigurations.vakedos is platform-independent in the outputs map and
      # is always evaluated. The lowering-FIXTURE flakes (placeholder revs) stay on
      # the parse-only nix-parse job — never checked.
      - name: nix flake check (evaluate all outputs, no build)
        id: flakecheck
        run: |
          set -o pipefail
          nix flake check --no-build 2>&1 | tee nix-check.log

      - name: Publish nix-check to step summary
        if: always()
        run: |
          echo "## nix-check (\`nix flake check --no-build\`)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 200 nix-check.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no log produced)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # Capture a short, markdown-safe tail for the Telegram body.
      - name: Summarize result
        if: always()
        id: sum
        run: |
          if [ -f nix-check.log ]; then
            # strip markdown/html-active chars so the Telegram body never breaks
            tail -n 8 nix-check.log | tr -d '`*_[]~|<>' > tail.txt
          else
            echo "(no log produced)" > tail.txt
          fi
          # random heredoc delimiter so a log line can never close it early
          delim="NIXEOF_$(date +%s%N)"
          {
            echo "tail<<${delim}"
            cat tail.txt
            echo "${delim}"
          } >> "$GITHUB_OUTPUT"

      # VERBOSE report — fires on EVERY run (success and failure), per request.
      # continue-on-error: the report is a best-effort side-channel; a delivery
      # failure (e.g. a bad TELEGRAM_TO chat id) must NOT flip a green flake-check
      # into a red job. It surfaces as a step warning instead.
      - name: Telegram report (verbose — always)
        if: always()
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} nix-check: ${{ job.status }} on ${{ github.ref_name }}
            ran: nix flake check --no-build
            ${{ steps.sum.outputs.tail }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
