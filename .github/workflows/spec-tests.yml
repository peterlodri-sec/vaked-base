name: spec-tests

# Runs the executable spec-test harness (tests/spec/) that builds recognizers from
# the on-disk EBNF grammars and checks every example derives, plus the lowering
# fixtures and doc links. Primary trigger: every version/tag bump (push of a v* tag).
#
# The jobs run in parallel for faster feedback:
#   python-spec  — the Python stdlib harness (grammar/examples/lowering/doc-links)
#   nix-parse    — parse-only check of flake.nix fixtures (no build, no network)
#   nix-check    — `nix flake check` of the ROOT flake: evaluates every output incl.
#                  nixosConfigurations.vakedos (catches module/option errors that
#                  parse-only misses). Sends a VERBOSE Telegram report every run
#                  (success and failure), not just on failure.
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pin Python for determinism (the harness is stdlib-only; system python3 would
      # also work, but a pinned version keeps CI reproducible).
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run spec-test harness
        run: |
          python3 tests/spec/run_all.py | tee spec-out.txt
          exit ${PIPESTATUS[0]}

      # The ralph driver's unit suite (stdlib-only, offline — every network call
      # is mocked). Guards the immutable event-log invariants (hash-chain, O(1)
      # fsynced append, boot verify/repair) + flat-cost windowing (#57/#58).
      - name: Run ralph unit tests
        run: python3 tools/ralph/test_ralph.py

      - name: Publish spec results to step summary
        if: always()
        run: |
          echo "## spec-tests" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat spec-out.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ spec-tests (python-spec) failed on ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  nix-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Parse-only Nix check of the flake fixtures. nix-instantiate --parse never
      # builds or fetches, so the fixtures' placeholder revs are never resolved.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Parse-check flake.nix fixtures (parse only — no build, no fetch)
        run: |
          nix-instantiate --parse flake.nix
          nix-instantiate --parse vaked/examples/lowering/flake.nix

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ spec-tests (nix-parse) failed on ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  nix-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The nix-installer enables flakes + the unified `nix` CLI by default.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      # Real EVALUATION check of the root flake: every output (devShells, formatter,
      # and crucially nixosConfigurations.vakedos — the host config) must evaluate.
      #   --no-build   evaluate, don't realize: still instantiates the vakedos
      #                toplevel derivation graph, but never tries to BUILD the
      #                x86_64-darwin / aarch64-* devShells (which can't build on a
      #                Linux runner) or the host closure.
      #   --all-systems evaluate outputs for every declared system, not just the runner's.
      # No flake.lock is committed yet, so this resolves nixpkgs (nixos-unstable) +
      # disko at run time. Committing `flake.lock` (via `nix flake lock`) is the
      # follow-up for full reproducibility + binary-cache hits. The lowering-FIXTURE
      # flakes (placeholder revs) stay on the parse-only nix-parse job — never checked.
      - name: nix flake check (evaluate all outputs, no build)
        id: flakecheck
        run: |
          set -o pipefail
          nix flake check --no-build --all-systems 2>&1 | tee nix-check.log

      - name: Publish nix-check to step summary
        if: always()
        run: |
          echo "## nix-check (\`nix flake check --no-build --all-systems\`)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 200 nix-check.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no log produced)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # Capture a short, markdown-safe tail for the Telegram body.
      - name: Summarize result
        if: always()
        id: sum
        run: |
          if [ -f nix-check.log ]; then
            # strip markdown-active chars so the Telegram (markdown) body never breaks
            tail -n 8 nix-check.log | tr -d '`*_[]' > tail.txt
          else
            echo "(no log produced)" > tail.txt
          fi
          {
            echo "tail<<NIXEOF"
            cat tail.txt
            echo "NIXEOF"
          } >> "$GITHUB_OUTPUT"

      # VERBOSE report — fires on EVERY run (success and failure), per request.
      - name: Telegram report (verbose — always)
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} nix-check: ${{ job.status }} on ${{ github.ref_name }}
            ran: nix flake check --no-build --all-systems
            ${{ steps.sum.outputs.tail }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
