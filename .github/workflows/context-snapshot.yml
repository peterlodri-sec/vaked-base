name: context-snapshot

# Regenerate the distilled context snapshot whenever the source files change.
# Agents (label-tagger) load this instead of the full GOALS.md + TIMELINE.md,
# keeping the prompt-cache prefix stable and reducing per-run token cost.

on:
  push:
    branches: [main]
    paths:
      - 'GOALS.md'
      - 'docs/context/TIMELINE.md'
      - 'tools/ralph/state/events.jsonl'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Generate snapshot
        run: python3 scripts/gen-context-snapshot.py > vaked-agents/ci/shared/context-snapshot.md

      - name: Commit if changed
        run: |
          git config user.name  "context-snapshot[bot]"
          git config user.email "context-snapshot@users.noreply.github.com"
          git add vaked-agents/ci/shared/context-snapshot.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(context-snapshot): regenerate [skip ci]"
            git pull --rebase --autostash
            git push
          else
            echo "::notice::snapshot unchanged — no commit"
          fi
