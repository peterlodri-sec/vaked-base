name: blog-deploy
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['blog/**', '.github/scripts/blog/**']

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Generate blog
        run: python3 .github/scripts/blog/generate.py
      - name: Commit posts
        run: |
          git config user.name "vaked-swarm"
          git config user.email "swarm@vaked.dev"
          git add blog/
          git diff --staged --quiet || git commit -m "blog: auto-generated posts [skip ci]"
          git push
