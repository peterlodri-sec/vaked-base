name: Social
on:
  schedule: [{ cron: '0 9 * * *' }]
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v6
      - run: echo "Social post placeholder"
      - if: failure()
        uses: appleboy/telegram-action@v1
        with: { to: "${{ secrets.TELEGRAM_TO }}", token: "${{ secrets.TELEGRAM_TOKEN }}", message: "Social failed" }
