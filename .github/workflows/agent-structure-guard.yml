name: agent-structure-guard

# Fails a PR that silently REVERTS a landed agent refactor (re-monolithizing a
# crate's main.rs, re-inlining setup_tracing over the shared vaked_telemetry
# crate, or deleting module files). These reverts happen when a long-lived agent
# branch is built on a pre-refactor base and merged without rebasing — the stale
# whole file wins the merge and undoes the landed work (#156, #173). The guard
# is the structural stop-gap: rebase the branch and the check passes.
on:
  pull_request:
    paths:
      - vaked-agents/ci/**
      - tools/ci/agent-structure-guard.sh
      - .github/workflows/agent-structure-guard.yml

permissions:
  contents: read

concurrency:
  group: agent-structure-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the PR base commit is available to diff against.
          fetch-depth: 0
      - name: Guard against agent-refactor reverts
        run: bash tools/ci/agent-structure-guard.sh "${{ github.event.pull_request.base.sha }}"
