name: ailish-ci

# Builds and tests the AI-lish V1 crate (parser + guardrail + ailishfmt).
# Runs on GitHub Actions runners — the sanctioned build target — never on a
# developer machine.

on:
  push:
    paths:
      - "ailish/**"
      - ".github/workflows/ailish-ci.yml"
  pull_request:
    paths:
      - "ailish/**"
      - ".github/workflows/ailish-ci.yml"
  workflow_dispatch:

jobs:
  ailish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ailish
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - name: Format check
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all-targets
      - name: Token benchmark (RFC §4 example)
        run: cargo run --quiet --bin ailish-tokenbench
