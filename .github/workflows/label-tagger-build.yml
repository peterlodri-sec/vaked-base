name: label-tagger-build

# Bakes the label-tagger agent binary once and publishes it as a rolling
# GitHub Release asset (tag `label-tagger-bin`). The label-tagger workflow
# downloads this instead of compiling on every trigger, avoiding cold start.
# Runs when the crate changes on main, or on demand.
on:
  push:
    branches: [main]
    paths:
      - vaked-agents/ci/label-tagger/**
      - .github/workflows/label-tagger-build.yml
  workflow_dispatch:

permissions:
  contents: write   # create/update the rolling release + upload asset

concurrency:
  group: label-tagger-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vaked-agents/ci/label-tagger

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set up mold linker
        uses: rui314/setup-mold@v1

      # Best-effort: install wild linker (fastest on supported cc).
      - name: Set up wild linker (preferred)
        continue-on-error: true
        run: |
          cargo install --locked wild-linker
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(command -v wild)" "$HOME/.local/bin/ld.wild"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build release binary
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
        run: |
          # Fastest linker that actually links with this cc (gcc rejects 'wild'
          # even when ld.wild is on PATH, so probe with a real test link).
          probe() {
            printf 'int main(){return 0;}' > "$RUNNER_TEMP/ld.c" && \
            cc -fuse-ld="$1" "$RUNNER_TEMP/ld.c" -o "$RUNNER_TEMP/ld.out" 2>/dev/null
          }
          FUSE=""
          for c in mold lld wild; do probe "$c" && FUSE="$c"; done
          FLAGS="-C target-cpu=x86-64-v3 -C symbol-mangling-version=v0"
          if [ -n "$FUSE" ]; then
            echo "::notice::linking with $FUSE"
            FLAGS="$FLAGS -C link-arg=-fuse-ld=$FUSE -C link-arg=-Wl,--icf=all"
          else
            echo "::notice::no fast linker accepted by cc — using default"
          fi
          export RUSTFLAGS="$FLAGS"
          cargo build --release \
            --manifest-path vaked-agents/ci/label-tagger/Cargo.toml
          cp vaked-agents/ci/label-tagger/target/release/vaked-label-tagger \
             vaked-label-tagger-linux-x86_64

      - name: Publish rolling release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the rolling release exists, then clobber the asset in place.
          gh release view label-tagger-bin >/dev/null 2>&1 || \
            gh release create label-tagger-bin \
              --title "Label-tagger agent (prebuilt)" \
              --notes "Rolling prebuilt linux-x86_64 binary of vaked-agents/ci/label-tagger. Auto-updated from main." \
              --prerelease
          gh release upload label-tagger-bin vaked-label-tagger-linux-x86_64 --clobber

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to:      ${{ secrets.TELEGRAM_TO }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ label-tagger-build failed on ${{ github.ref_name }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
