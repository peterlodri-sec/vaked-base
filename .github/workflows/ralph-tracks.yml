name: ralph-tracks

# Scheduled host for the ralph concept-track loop. Each tick runs ONE track's
# decision (rotation derived from the committed event ledger) and commits the
# appended decision log + events.jsonl. No long-lived daemon; the hash-chained
# events.jsonl in git history is the rotation pointer and the audit trail.
#
# Safe to merge before secrets exist: if OPENROUTER_API_KEY is unset the job
# no-ops cleanly (it does not fail). Add the secret to actually enable the loop.

on:
  schedule:
    # ~8 decisions/day (≈2 per track across 4 tracks) — paced to a ~1h/day
    # human ratify budget. Tighten only once ratification keeps up.
    - cron: "0 */3 * * *"
    # 23:00 UTC tick so the daily recap (digest) fires near end-of-day.
    - cron: "0 23 * * *"
  workflow_dispatch: {}

concurrency:
  # Serialize ticks so two runs never race the append-only ledger.
  group: ralph-tracks
  cancel-in-progress: false

permissions:
  contents: write   # the tick commit pushes the appended decision log + events.jsonl
  issues: write     # the announce step opens a deduped issue when posting fails

jobs:
  decide:
    runs-on: ubuntu-latest
    # Secrets (OPENROUTER_API_KEY, MASTODON_ACCESS_TOKEN, LANGFUSE_*, …) live in
    # the `ci` GitHub Environment — the job MUST reference it or `secrets.*`
    # resolves empty and the guard below skips every run.
    environment: ci
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: events.jsonl chain replay + path-scoped `git log`.
          fetch-depth: 0

      - name: Guard — skip when no OpenRouter key is configured
        id: guard
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RALPH_API_KEY: ${{ secrets.RALPH_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ] && [ -z "$RALPH_API_KEY" ]; then
            echo "no API key secret set — skipping (add OPENROUTER_API_KEY to enable)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.guard.outputs.run == 'true'
        run: pipx install uv

      - name: Decide one track (rotation from the event ledger)
        if: steps.guard.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}                       # gh issue list needs a token in CI
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RALPH_API_KEY: ${{ secrets.RALPH_API_KEY }}         # optional: self-hosted endpoint key
          RALPH_BASE_URL: ${{ secrets.RALPH_BASE_URL }}       # optional: trust-boundary endpoint
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}   # optional: enables tracing
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        run: |
          # Only pull the (heavy) langfuse extra when tracing is actually configured.
          EXTRA=""
          if [ -n "$LANGFUSE_PUBLIC_KEY" ]; then EXTRA="--extra tracing"; fi
          uv run --project tools/ralph $EXTRA tools/ralph/ralph.py decide --next-track

      # Announce AFTER decide but BEFORE commit, so a successful toot's
      # `announced` ledger event is committed too. This step is allowed to fail
      # loudly (fail-fast + CI red + a deduped issue) — the commit below still
      # runs via `always()`, so a Mastodon outage never drops the decision.
      - name: Announce the decision to Mastodon
        id: announce
        if: steps.guard.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}                       # gh issue create (failure issue) + gh
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}   # gpt-oss-120b writes the toot
          RALPH_API_KEY: ${{ secrets.RALPH_API_KEY }}
          RALPH_BASE_URL: ${{ secrets.RALPH_BASE_URL }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}   # unset → step no-ops
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}          # optional: override instance URL
          MASTODON_VISIBILITY: ${{ vars.MASTODON_VISIBILITY }}        # optional env VARIABLE; default unlisted
        run: |
          EXTRA=""
          if [ -n "$LANGFUSE_PUBLIC_KEY" ]; then EXTRA="--extra tracing"; fi
          uv run --project tools/ralph $EXTRA tools/ralph/ralph.py announce

      # Best-effort once-daily RECAP toot: a funny summary of the last 24h of
      # repo activity + ratify stats + 3 R&D links, generated by gpt-oss. Fires
      # near RALPH_DIGEST_HOUR (default 23 UTC) and self-gates per day. always()
      # so it still runs if the announce step above failed.
      - name: Daily recap (best-effort)
        if: ${{ always() && steps.guard.outputs.run == 'true' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}   # gpt-oss writes the recap
          RALPH_API_KEY: ${{ secrets.RALPH_API_KEY }}
          RALPH_BASE_URL: ${{ secrets.RALPH_BASE_URL }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          MASTODON_VISIBILITY: ${{ vars.MASTODON_VISIBILITY }}
          RALPH_DIGEST_HOUR: ${{ vars.RALPH_DIGEST_HOUR }}        # optional, default 23 (UTC)
        run: |
          EXTRA=""
          if [ -n "$LANGFUSE_PUBLIC_KEY" ]; then EXTRA="--extra tracing"; fi
          uv run --project tools/ralph $EXTRA tools/ralph/ralph.py digest

      - name: Commit the decision + event ledger
        # always() so a failed announce never blocks the decision commit
        if: ${{ always() && steps.guard.outputs.run == 'true' }}
        run: |
          git config user.name  "ralph-loop"
          git config user.email "ralph@vaked.local"
          # Stage the directories (both always exist via .gitkeep) rather than a
          # specific file, so a missing events.jsonl / skipped decision can't make
          # `git add` exit 128; the diff-quiet check below is the real
          # nothing-to-commit guard. status.json stays gitignored.
          git add docs/decisions/ tools/ralph/state/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            # [skip ci] — a decision tick shouldn't re-trigger spec-tests.
            git commit -m "ralph(tracks): decision tick [skip ci]"
            # Cron is serialized by `concurrency`, but a human push could land
            # between checkout and push — rebase onto it to avoid a rejected
            # non-fast-forward.
            git pull --rebase --autostash
            git push
          fi
