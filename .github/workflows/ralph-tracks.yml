name: ralph-tracks

# Scheduled host for the ralph concept-track loop. Each tick runs ONE track's
# decision (rotation derived from the committed event ledger) and commits the
# appended decision log + events.jsonl. No long-lived daemon; the hash-chained
# events.jsonl in git history is the rotation pointer and the audit trail.
#
# Safe to merge before secrets exist: if OPENROUTER_API_KEY is unset the job
# no-ops cleanly (it does not fail). Add the secret to actually enable the loop.

on:
  # Schedule PAUSED to conserve OpenRouter credit (stage-1 uses the pricey
  # qwen3-235b-thinking reasoner). Re-enable by uncommenting when credit is
  # refilled; manual workflow_dispatch still works for a clean restart meanwhile.
  # schedule:
  #   # ~8 decisions/day (≈2 per track across 4 tracks) — paced to a ~1h/day
  #   # human ratify budget. Tighten only once ratification keeps up.
  #   - cron: "0 */3 * * *"
  #   # 23:00 UTC tick for the daily recap ONLY — the decide/announce steps are
  #   # gated off this cron so it doesn't add an extra decision.
  #   - cron: "0 23 * * *"
  workflow_dispatch: {}

concurrency:
  # Serialize ticks so two runs never race the append-only ledger.
  group: ralph-tracks
  cancel-in-progress: false

permissions:
  contents: write   # the tick commit pushes the appended decision log + events.jsonl
  issues: write     # the announce step opens a deduped issue when posting fails

jobs:
  decide:
    runs-on: [self-hosted, linux, hetzner]
    timeout-minutes: 20
    # Secrets (OPENROUTER_API_KEY, MASTODON_ACCESS_TOKEN, LANGFUSE_*, …) live in
    # the `ci` GitHub Environment — the job MUST reference it or `secrets.*`
    # resolves empty and the guard below skips every run.
    environment: ci
    steps:
      - uses: actions/checkout@v6
        with:
          # Operate on the LATEST main (not the trigger SHA) so back-to-back
          # ticks always see the most recent committed ledger.
          ref: main
          # Full history: events.jsonl chain replay + path-scoped `git log`.
          fetch-depth: 0

      - name: Guard — skip when no OpenRouter key is configured
        id: guard
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RALPH_API_KEY: ${{ secrets.RALPH_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ] && [ -z "$RALPH_API_KEY" ]; then
            echo "no API key secret set — skipping (add OPENROUTER_API_KEY to enable)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.guard.outputs.run == 'true'
        uses: astral-sh/setup-uv@v8.2.0

      - name: Decide one track (rotation from the event ledger)
        # Skip on the 23:00 recap-only trigger so it doesn't add a 9th decision.
        if: ${{ steps.guard.outputs.run == 'true' && github.event.schedule != '0 23 * * *' }}
        env:
          GH_TOKEN: ${{ github.token }}                       # gh issue list needs a token in CI
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RALPH_API_KEY: ${{ secrets.RALPH_API_KEY }}         # optional: self-hosted endpoint key
          RALPH_BASE_URL: ${{ secrets.RALPH_BASE_URL }}       # optional: trust-boundary endpoint
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}   # optional: enables tracing
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          RALPH_WRITER_MODEL: ${{ vars.RALPH_WRITER_MODEL }}   # optional: strong stage-2 writer (else the track model)
          RALPH_CRITIQUE: ${{ vars.RALPH_CRITIQUE }}           # optional: 'off' disables the stage-3 self-critique
        run: |
          # Only pull the (heavy) langfuse extra when tracing is actually configured.
          EXTRA=""
          if [ -n "$LANGFUSE_PUBLIC_KEY" ]; then EXTRA="--extra tracing"; fi
          uv run --project tools/ralph $EXTRA tools/ralph/ralph.py decide --next-track

      # Persist the decision to main BEFORE any external Mastodon post, so a
      # published toot can never describe a decision that isn't durably on main.
      - name: Commit the decision ledger
        if: ${{ always() && steps.guard.outputs.run == 'true' }}
        run: |
          git config user.name  "ralph-loop"
          git config user.email "ralph@vaked.local"
          # Stage dirs (both exist via .gitkeep) so a missing events.jsonl /
          # skipped decision can't make `git add` exit 128; diff-quiet is the
          # real nothing-to-commit guard. status.json stays gitignored.
          git add docs/decisions/ tools/ralph/state/
          if git diff --cached --quiet; then
            echo "no decision changes to commit"
          else
            git commit -m "ralph(tracks): decision tick [skip ci]"
            git pull --rebase --autostash   # survive a concurrent human push
            git push
          fi

      # Now that the decision is durable, announce it. Allowed to fail loudly
      # (fail-fast + CI red + a deduped issue); the records commit below still
      # runs via always(). A successful toot's `announced` event is committed by
      # that later step (residual risk: if THAT push fails, the next tick may
      # re-toot the same id once Mastodon's idempotency window lapses).
      - name: Announce the decision to Mastodon
        id: announce
        # Same gate as decide: nothing new to announce on the recap-only tick.
        if: ${{ steps.guard.outputs.run == 'true' && github.event.schedule != '0 23 * * *' }}
        env:
          GH_TOKEN: ${{ github.token }}                       # gh issue create (failure issue) + gh
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}   # gpt-oss-120b writes the toot
          RALPH_API_KEY: ${{ secrets.RALPH_API_KEY }}
          RALPH_BASE_URL: ${{ secrets.RALPH_BASE_URL }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}   # unset → step no-ops
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}          # optional: override instance URL
          MASTODON_VISIBILITY: ${{ vars.MASTODON_VISIBILITY }}        # optional env VARIABLE; default unlisted
          RALPH_TOOT_IMAGE: ${{ vars.RALPH_TOOT_IMAGE }}              # optional: 'off' disables the generated image
          RALPH_IMAGE_MODEL: ${{ vars.RALPH_IMAGE_MODEL }}            # optional: override the OpenRouter image model
        run: |
          # --extra images installs Pillow so the toot image is compressed before upload.
          EXTRA="--extra images"
          if [ -n "$LANGFUSE_PUBLIC_KEY" ]; then EXTRA="$EXTRA --extra tracing"; fi
          uv run --project tools/ralph $EXTRA tools/ralph/ralph.py announce

      # Best-effort once-daily RECAP toot: a funny summary of the last 24h of
      # repo activity + ratify stats + 3 R&D links, generated by gpt-oss. Fires
      # near RALPH_DIGEST_HOUR (default 23 UTC) and self-gates per day. always()
      # so it still runs if the announce step above failed.
      - name: Daily recap (best-effort)
        if: ${{ always() && steps.guard.outputs.run == 'true' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}   # gpt-oss writes the recap
          RALPH_API_KEY: ${{ secrets.RALPH_API_KEY }}
          RALPH_BASE_URL: ${{ secrets.RALPH_BASE_URL }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          MASTODON_VISIBILITY: ${{ vars.MASTODON_VISIBILITY }}
          RALPH_DIGEST_HOUR: ${{ vars.RALPH_DIGEST_HOUR }}        # optional, default 23 (UTC)
        run: |
          EXTRA=""
          if [ -n "$LANGFUSE_PUBLIC_KEY" ]; then EXTRA="--extra tracing"; fi
          uv run --project tools/ralph $EXTRA tools/ralph/ralph.py digest

      # Persist the side-effect records (the `announced` / `digest` ledger
      # events) appended after the decision was already committed above.
      - name: Commit announce + digest records
        if: ${{ always() && steps.guard.outputs.run == 'true' }}
        run: |
          git config user.name  "ralph-loop"
          git config user.email "ralph@vaked.local"
          git add docs/decisions/ tools/ralph/state/
          if git diff --cached --quiet; then
            echo "no records to commit"
          else
            # [skip ci] — a tick shouldn't re-trigger spec-tests.
            git commit -m "ralph(tracks): announce/digest records [skip ci]"
            git pull --rebase --autostash
            git push
          fi

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ ralph-tracks failed (tick: ${{ github.event.schedule || 'manual' }})\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
