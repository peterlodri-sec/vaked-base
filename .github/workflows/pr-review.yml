name: pr-review

# Advisory PR reviewer: an adk-rust agent (vaked-agents/ci/pr-review) that runs a
# non-frontier OpenRouter model (DeepSeek V4 Flash) over the diff, with the repo's own crabcc
# symbol index wired in over MCP, RTK condensing the diff to save tokens, and
# tracing every run to self-hosted Langfuse. It posts ONE COMMENT review and never
# fails the check (fork PRs get no secrets, which just disables the network calls).
#
# Cold start is avoided by downloading the prebuilt binary published by
# pr-review-build.yml (rolling `pr-review-bin` release). Compiling from source is
# only a fallback when the prebuilt asset is unavailable.
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr:
        description: PR number to review
        required: true

permissions:
  contents: read
  pull-requests: write
  statuses: write # advisory commit status with the finding count

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.event.inputs.pr }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    environment: ci # OPENROUTER_API_KEY / LANGFUSE_* live in the `ci` Environment
    timeout-minutes: 25 # hard cap so a runaway tool loop can't hang CI
    env:
      # `secrets` can't be used in step `if:`; surface what we gate on as env.
      CRABCC_INSTALL_TOKEN: ${{ secrets.CRABCC_INSTALL_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so RTK can diff base...head.
          fetch-depth: 0

      # Dogfooding: if this PR changes the agent itself, build from source so the
      # review runs the new code instead of a stale prebuilt.
      - name: Detect agent source changes
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=false
          if [ -n "${BASE_SHA}" ] && [ -n "${HEAD_SHA}" ] && \
             git diff --name-only "${BASE_SHA}...${HEAD_SHA}" -- vaked-agents/ci/pr-review | grep -q .; then
            changed=true
          fi
          echo "agent=${changed}" >> "$GITHUB_OUTPUT"

      # Diff-size gate: skip agent review on trivial PRs (< 50 lines added).
      # Saves ~$1-2 in OpenRouter tokens per small PR; owner PRs always reviewed.
      - name: Diff-size gate
        id: diff_gate
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          ADDITIONS=$(git diff --numstat "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null | awk '{s+=$1}END{print s+0}')
          echo "additions=${ADDITIONS}" >> "$GITHUB_OUTPUT"
          if [ "${ADDITIONS}" -le 50 ] && [ "${{ github.event.pull_request.user.login }}" != "${{ github.repository_owner }}" ]; then
            echo "::notice::Diff ${ADDITIONS} lines — under review threshold, skipping agent"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Fast path: grab the prebuilt agent (no compile). Skipped when the agent
      # source changed; continue-on-error so a missing asset falls through to build.
      - name: Download prebuilt agent
        id: prebuilt
        if: steps.changed.outputs.agent != 'true'
        continue-on-error: true
        run: |
          gh release download pr-review-bin \
            --pattern vaked-pr-review-linux-x86_64 \
            --output ./vaked-pr-review
          chmod +x ./vaked-pr-review

      # Fallback toolchain + cache, only when we must build from source.
      - name: Install Rust toolchain
        if: steps.changed.outputs.agent == 'true' || steps.prebuilt.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        if: steps.changed.outputs.agent == 'true' || steps.prebuilt.outcome == 'failure'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vaked-agents/ci/pr-review
      # sccache + mold speed the from-source fallback (gated the same way).
      - name: Set up sccache
        if: steps.changed.outputs.agent == 'true' || steps.prebuilt.outcome == 'failure'
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Set up mold linker
        if: steps.changed.outputs.agent == 'true' || steps.prebuilt.outcome == 'failure'
        uses: rui314/setup-mold@v1

      # RTK ("Rust Token Killer") condenses the diff. Public tool, best-effort.
      - name: Install RTK (optional)
        run: |
          curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh \
            || echo "rtk install skipped — agent falls back to gh pr diff"

      # Reuse the crabcc symbol index across runs (the agent refreshes it in place).
      - name: Cache crabcc index
        uses: actions/cache@v5
        with:
          path: .crabcc
          key: crabcc-index-${{ github.repository }}
          restore-keys: crabcc-index-

      # crabcc is a private (crabcc-labs) tool — install only with a PAT.
      # Binary is cached per version to avoid recompiling on every run.
      - name: Cache crabcc binary (v6.5.1)
        id: crabcc-bin-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/crabcc
          key: crabcc-bin-v6.5.1-${{ runner.os }}

      - name: Install crabcc v6.5.1 (optional)
        if: ${{ env.CRABCC_INSTALL_TOKEN != '' && steps.crabcc-bin-cache.outputs.cache-hit != 'true' }}
        run: |
          git config --global url."https://x-access-token:${CRABCC_INSTALL_TOKEN}@github.com/".insteadOf "https://github.com/"
          CARGO_NET_GIT_FETCH_WITH_CLI=true \
            cargo install --git https://github.com/crabcc-labs/crabcc --tag v6.5.1 crabcc-cli --force || \
            echo "crabcc install failed — agent will review diff-only"

      - name: Run PR reviewer
        if: steps.diff_gate.outputs.skip != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Model is config, not baked into the binary. Pinned to Haiku 4.5: a
          # reliable tool-driver that emits the structured findings the reviewer
          # needs (deepseek/glm narrated tool intent instead). Wins over any
          # stale default compiled into a prebuilt agent asset.
          PR_REVIEW_MODEL: anthropic/claude-haiku-4-5
          # Self-hosted Langfuse. Agent prefers LANGFUSE_HOST and builds the OTLP Basic
          # token from the public/secret key pair (legacy LANGFUSE_URL/API_KEY still work).
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PROJECT_ID: ${{ secrets.LANGFUSE_PROJECT_ID }} # optional: enables the comment→trace deep-link
          GITHUB_SERVER_URL: ${{ github.server_url }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          export PATH="$HOME/.local/bin:$HOME/.rtk/bin:$PATH"
          if [ -x ./vaked-pr-review ]; then
            echo "::notice::using prebuilt agent (no compile)"
            ./vaked-pr-review --repo "${GITHUB_REPOSITORY}" --pr "${PR_NUMBER}"
          else
            echo "::notice::prebuilt unavailable — building from source"
            if command -v sccache >/dev/null; then
              export RUSTC_WRAPPER=sccache SCCACHE_GHA_ENABLED=true
            fi
            # Fastest linker that actually links with this cc, preferring wild > lld
            # > mold. gcc validates the -fuse-ld= value (rejects 'wild' even when
            # ld.wild is on PATH), so probe with a real test link, not just PATH.
            probe() { printf 'int main(){return 0;}' > "$RUNNER_TEMP/ld.c" && cc -fuse-ld="$1" "$RUNNER_TEMP/ld.c" -o "$RUNNER_TEMP/ld.out" 2>/dev/null; }
            FUSE=""; for c in mold lld wild; do probe "$c" && FUSE="$c"; done
            FLAGS="-C target-cpu=x86-64-v3 -C symbol-mangling-version=v0"
            [ -n "$FUSE" ] && FLAGS="$FLAGS -C link-arg=-fuse-ld=$FUSE -C link-arg=-Wl,--icf=all"
            export RUSTFLAGS="$FLAGS"
            cargo run --release --manifest-path vaked-agents/ci/pr-review/Cargo.toml -- \
              --repo "${GITHUB_REPOSITORY}" --pr "${PR_NUMBER}"
          fi

      - name: Notify Telegram on failure
        if: failure()
        uses: ./.github/actions/notify-telegram
        with:
          telegram-to: ${{ secrets.TELEGRAM_TO }}
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ pr-review failed for PR #${{ github.event.pull_request.number || github.event.inputs.pr }} on ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
