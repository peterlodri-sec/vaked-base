name: docs-keeper

# doc-keeper agent: deterministic doc/spec/RFC drift checks (tools/dockeeper). The
# antidote to a model guessing whether a reference resolves — it checks. Errors
# (in-range RFC gaps, dangling repo-path refs in stable docs) fail CI; warnings
# (planned/forward RFC refs, stale stub READMEs) are surfaced, not fatal.
on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "protocol/**"
      - "tools/dockeeper/**"
  pull_request:
    paths:
      - "**/*.md"
      - "protocol/**"
      - "tools/dockeeper/**"
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC — catch drift even without a doc push
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  doc-keeper:
    runs-on: ubuntu-latest
    environment: ci # only for the optional Telegram failure-notify secrets
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Unit tests (drift checks)
        run: python3 tools/dockeeper/test_dockeeper.py
      - name: Check docs/specs/RFC drift
        run: python3 tools/dockeeper/dockeeper.py
      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "❌ doc-keeper found doc/RFC drift on ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
