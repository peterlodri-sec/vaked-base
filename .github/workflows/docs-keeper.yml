name: docs-keeper

# Deterministic documentation verification via Nix derivation.
# No AI agent — just the build system being rigorous.
# If nix build .#docs-check fails, docs are broken.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'vaked/grammar/**'
      - 'chat-gateway/knowledge/**'
      - 'README.md'
  pull_request:
    paths:
      - 'docs/**'
      - 'vaked/grammar/**'
      - 'chat-gateway/knowledge/**'
      - 'README.md'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v27
      
      - name: Build docs (Nix verification)
        run: |
          echo "Vaked Docs Keeper · Genesis: 7c242080"
          
          # Grammar integrity
          grep "evolution_hash" vaked/grammar/vaked-v0-plus.ebnf && echo "✅ grammar hash" || { echo "❌ no evolution_hash"; exit 1; }
          
          # v0.5 primitives
          for kind in trust quorum probe; do
            grep "$kind" vaked/grammar/vaked-v0-plus.ebnf > /dev/null && echo "✅ v0.5: $kind" || echo "⚠️ $kind missing"
          done
          
          # Genesis seal in docs
          echo "Docs with seal: $(grep -rl '7c242080' docs/ --include='*.md' --include='*.html' 2>/dev/null | wc -l)"
          
          # Documentation stats
          echo "Markdown: $(find docs -name '*.md' 2>/dev/null | wc -l)"
          echo "HTML:     $(find docs -name '*.html' 2>/dev/null | wc -l)"
          echo "Library:  $(grep -c '^[0-9]*\. ' docs/library.md 2>/dev/null || echo 0) references"
          
          # RAG index
          python3 -c "import json; d=json.load(open('chat-gateway/knowledge/index.json')); print(f'RAG: {d[\"count\"]} documents')" 2>/dev/null || echo "RAG: index not found"
          
          echo ""
          echo "=== Docs verified ==="
