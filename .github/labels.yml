# Vaked-base label taxonomy.
# Machine-readable: consumed by vaked-agents/ci/label-tagger on every run.
# Edit this file to evolve the taxonomy; the agent reads it live and never
# uses hard-coded label knowledge.

# Area labels — map to top-level directories and subsystems.
- name: "area/language"
  color: "0075ca"
  description: "vaked/ grammar, schema, examples"

- name: "area/compiler"
  color: "e4e669"
  description: "vakedc/ frontend (parse → check → lower)"

- name: "area/docs"
  color: "cfd3d7"
  description: "docs/ design series, context, references"

- name: "area/protocol"
  color: "7057ff"
  description: "protocol/ HCP/Litany RFCs and wire formats"

- name: "area/runtime"
  color: "008672"
  description: "daemons/ hosts/ OTP supervision plane and Zig daemons"

- name: "area/agents"
  color: "e4e669"
  description: "vaked-agents/ CI and fleet agents"

- name: "area/tools"
  color: "d4c5f9"
  description: "tools/ utility scripts (ralph, dockeeper, yardmaster, etc.)"

- name: "area/ci"
  color: "fef2c0"
  description: ".github/ workflows, Actions configuration"

- name: "area/nix"
  color: "cfd3d7"
  description: "flake.nix, Nix module configuration"

# Type labels — describe what kind of change the PR or issue represents.
- name: "type/feature"
  color: "0e8a16"
  description: "New capability or behaviour"

- name: "type/fix"
  color: "d73a4a"
  description: "Bug fix"

- name: "type/refactor"
  color: "e4e669"
  description: "Code restructuring without behaviour change"

- name: "type/docs"
  color: "0075ca"
  description: "Documentation only — no code change"

- name: "type/chore"
  color: "cfd3d7"
  description: "Maintenance, tooling, dependency updates"

- name: "type/design"
  color: "7057ff"
  description: "Design document, RFC, or architectural decision"

- name: "type/spec"
  color: "b60205"
  description: "Grammar, EBNF, or language specification change"

- name: "type/epic"
  color: "5319e7"
  description: "Epic — coordinates child issues toward a milestone (managed by provost)"

# Phase labels — derived from the GOALS.md milestone phases.
# The agent reads GOALS.md live; these labels reflect its current phases.
- name: "phase/0"
  color: "b60205"
  description: "Phase 0 — Language foundation"

- name: "phase/1"
  color: "e4e669"
  description: "Phase 1 — Compiler maturity"

- name: "phase/2"
  color: "0075ca"
  description: "Phase 2 — Runtime: stubs → real"

- name: "phase/3"
  color: "7057ff"
  description: "Phase 3 — Wire protocol"

- name: "phase/4"
  color: "c2e0c6"
  description: "Phase 4 — Surfaces and observability"

- name: "phase/5"
  color: "0e8a16"
  description: "Phase 5 — Language v1"

# Trigger labels.
- name: "agent"
  color: "ff6b6b"
  description: "Run the swe_af workflow (plan→code→review→publish) on this issue — opens an advisory PR"

# Size labels — consumed by ci-gate to scale test depth.
# Set manually to override auto-detection from diff stats.
- name: "size/chore"
  color: "cfd3d7"
  description: "CI: smoke only — whitespace, comments, gitignore, config"

- name: "size/tiny"
  color: "c2e0c6"
  description: "CI: smoke only — ≤20 net lines"

- name: "size/small"
  color: "0075ca"
  description: "CI: smoke + path-targeted — ≤100 net lines"

- name: "size/targeted"
  color: "e4e669"
  description: "CI: smoke + path-targeted — single-purpose, focused change"

- name: "size/medium"
  color: "fef2c0"
  description: "CI: standard suite — ≤300 net lines"

- name: "size/big"
  color: "d93f0b"
  description: "CI: full suite — ≤800 net lines"

- name: "size/ultra"
  color: "b60205"
  description: "CI: full suite + nix-check — 800+ net lines"

- name: "ping-owner"
  color: "7057ff"
  description: "CI blocked — needs human review before merging"

# Special/control labels.
- name: "no-auto-label"
  color: "ffffff"
  description: "Skip the label-tagger agent for this PR or issue"

- name: "no-bot-review"
  color: "ffffff"
  description: "Skip the pr-review agent for this PR"

- name: "no-auto-coordinate"
  color: "ffffff"
  description: "Skip the provost coordination agent for this issue"
