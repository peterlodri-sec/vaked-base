<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vaked — The Constellation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060c;overflow:hidden;font-family:'Inter','SF Pro',sans-serif;color:#c0c8d8}

#top-right{position:fixed;top:24px;right:24px;z-index:11;text-align:right}

#override-btn:hover{border-color:#4060a0;color:#80a0e0}
#override-btn.active{border-color:#ff9600;color:#ff9600;background:rgba(255,150,0,0.08)}
#status-badge{padding:4px 10px;border-radius:3px;font-size:9px;letter-spacing:1px;background:rgba(0,200,100,0.1);border:1px solid rgba(0,200,100,0.2);color:#00c864}
#canvas-container{width:100vw;height:100vh;position:fixed;top:0;left:0}
.log-line.i{border-left:1px solid #20b0ff;padding-left:4px}
.log-line.s{border-left:1px solid #20c060;padding-left:4px;color:#40e080}
.log-line.e{border-left:1px solid #ff4242;padding-left:4px;color:#ff6060}
.log-line.w{border-left:1px solid #ffb020;padding-left:4px;color:#ffc040}

  /* CrabCC alignment — orange accents, monospace, compact */
  .crabcc-accent { color: #ff8c42; }
/* Vaked Swarm Design System v1.0
   Genesis: 7c242080 · Ultimate: 81aa1c0b
   
   ROUND 1: Unified dark palette
   ROUND 2: Typography (JetBrains Mono + Inter)
   ROUND 3: Subtle animations
   ROUND 4: Mobile-first responsive
   ROUND 5: Accessibility (WCAG AA)
   ROUND 6: Swarm magic (genesis glow, convergence pulse)
*/

/* ── Design Tokens ──────────────────────────────────────────────────── */
:root {
  /* Core palette */
  --bg-deep:      #08081a;
  --bg-card:      rgba(14,14,34,0.6);
  --bg-header:    linear-gradient(180deg, #0c0c24, #08081a);
  
  /* Accent colors — used ONLY for state changes */
  --accent-blue:   #3060ff;
  --accent-cyan:   #20b0ff;
  --accent-green:  #00c864;
  --accent-gold:   #c8a000;
  --accent-purple: #8060c0;
  --accent-red:    #ff4242;
  
  /* Text hierarchy */
  --text-primary:   #e0e8f0;
  --text-secondary: #90a0c0;
  --text-muted:     #5a5a7a;
  --text-subtle:    #3a4a5a;
  
  /* Borders & dividers */
  --border-subtle:  rgba(48,96,255,0.08);
  --border-card:    rgba(48,96,255,0.12);
  --border-active:  rgba(48,96,255,0.25);
  
  /* Typography */
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  --font-sans: 'Inter', 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
  
  /* Spacing scale */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 40px;
  --space-2xl: 60px;
  
  /* Animation */
  --transition-fast: 0.15s ease;
  --transition-base: 0.3s ease;
  --transition-slow: 0.5s ease;
  
  /* Genesis glow — recursive swarm magic */
  --genesis-glow: 0 0 20px rgba(48,96,255,0.08), 0 0 40px rgba(48,96,255,0.04);
  --genesis-glow-active: 0 0 30px rgba(48,96,255,0.15), 0 0 60px rgba(48,96,255,0.08);
}

/* ── Base Reset ─────────────────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--bg-deep);
  color: var(--text-secondary);
  font-family: var(--font-sans);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Typography ─────────────────────────────────────────────────────── */
h1, h2, h3, h4 { font-weight: 600; color: var(--text-primary); }
h1 { font-size: 1.75rem; letter-spacing: -0.02em; }
h2 { font-size: 1.25rem; }
h3 { font-size: 1rem; }

code, pre, .mono {
  font-family: var(--font-mono);
  font-size: 0.8rem;
}

a {
  color: var(--accent-blue);
  text-decoration: none;
  transition: color var(--transition-fast);
}
a:hover { color: #80b0ff; }
a:focus-visible {
  outline: 2px solid var(--accent-cyan);
  outline-offset: 2px;
  border-radius: 2px;
}

/* ── Selection ──────────────────────────────────────────────────────── */
::selection {
  background: rgba(48,96,255,0.2);
  color: var(--text-primary);
}

/* ── Scrollbar ──────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--text-subtle); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Cards ──────────────────────────────────────────────────────────── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: 10px;
  padding: var(--space-md);
  transition: border-color var(--transition-base), box-shadow var(--transition-base);
}
.card:hover {
  border-color: var(--border-active);
  box-shadow: var(--genesis-glow);
}

/* ── Buttons ────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-sm) var(--space-md);
  border: 1px solid var(--border-card);
  border-radius: 6px;
  background: rgba(48,96,255,0.06);
  color: var(--accent-blue);
  font-size: 0.75rem;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all var(--transition-fast);
  text-decoration: none;
  user-select: none;
}
.btn:hover {
  background: rgba(48,96,255,0.12);
  border-color: var(--border-active);
  color: #80b0ff;
}
.btn:focus-visible {
  outline: 2px solid var(--accent-cyan);
  outline-offset: 2px;
}
.btn.active {
  border-color: var(--accent-green);
  color: var(--accent-green);
  background: rgba(0,200,100,0.06);
}
.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ── Tables ─────────────────────────────────────────────────────────── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
}
th {
  color: var(--accent-blue);
  font-weight: 500;
  font-size: 0.625rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-subtle);
  text-align: left;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  vertical-align: top;
}
tr:hover td {
  background: rgba(48,96,255,0.04);
}

/* ── Status badges ──────────────────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 0.5625rem;
  letter-spacing: 0.05em;
  font-weight: 500;
}
.badge-ok    { background: rgba(0,200,100,0.1); border:1px solid rgba(0,200,100,0.2); color: var(--accent-green); }
.badge-warn  { background: rgba(255,200,0,0.1);  border:1px solid rgba(255,200,0,0.2);  color: #ffc800; }
.badge-crit  { background: rgba(255,66,66,0.1);  border:1px solid rgba(255,66,66,0.2);  color: var(--accent-red); }
.badge-info  { background: rgba(32,176,255,0.1); border:1px solid rgba(32,176,255,0.2); color: var(--accent-cyan); }

/* ── Section header ─────────────────────────────────────────────────── */
.section-header {
  font-size: 0.6875rem;
  color: var(--accent-blue);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin: var(--space-xl) 0 var(--space-sm);
}

/* ── Header bar ─────────────────────────────────────────────────────── */
.site-header {
  background: var(--bg-header);
  border-bottom: 1px solid var(--border-subtle);
  padding: var(--space-xl) 48px var(--space-lg);
}
.site-header h1 {
  font-size: 0.6875rem;
  color: var(--accent-blue);
  letter-spacing: 0.25em;
  text-transform: uppercase;
}
.site-header .title {
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-top: var(--space-xs);
}
.site-header .sub {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: var(--space-xs);
}

/* ── Genesis seal glow — recursive magic ────────────────────────────── */
.genesis-seal {
  position: relative;
}
.genesis-seal::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: inherit;
  background: radial-gradient(circle at 50% 50%, rgba(48,96,255,0.06) 0%, transparent 70%);
  pointer-events: none;
  animation: genesisPulse 4s ease-in-out infinite;
}
@keyframes genesisPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* ── Convergence indicator ──────────────────────────────────────────── */
.convergence-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-green);
  animation: convergePulse 2s ease-in-out infinite;
}
@keyframes convergePulse {
  0%, 100% { box-shadow: 0 0 4px var(--accent-green); }
  50% { box-shadow: 0 0 12px var(--accent-green), 0 0 24px rgba(0,200,100,0.3); }
}

/* ── Responsive ─────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .site-header { padding: var(--space-lg) var(--space-md); }
  .site-header .title { font-size: 1.25rem; }
  body { font-size: 0.875rem; }
  table { font-size: 0.6875rem; }
  th, td { padding: 8px; }
}


/* ── Light Theme (data-theme="light") ────────────────────────────────── */
[data-theme="light"] {
  --bg-deep:      #f0f2f5;
  --bg-card:      rgba(255,255,255,0.8);
  --bg-header:    linear-gradient(180deg, #e8ecf0, #f0f2f5);
  
  --text-primary:   #1a1a2e;
  --text-secondary: #4a4a6a;
  --text-muted:     #8a8aaa;
  --text-subtle:    #babbcc;
  
  --border-subtle:  rgba(0,0,0,0.06);
  --border-card:    rgba(0,0,0,0.1);
  --border-active:  rgba(48,96,255,0.2);
  
  --accent-blue:   #2040d0;
  --accent-green:  #108040;
  --accent-red:    #c02020;
}

[data-theme="light"] ::selection {
  background: rgba(48,96,255,0.15);
  color: var(--text-primary);
}

[data-theme="light"] .btn {
  background: rgba(48,96,255,0.04);
}
[data-theme="light"] .btn:hover {
  background: rgba(48,96,255,0.08);
}

[data-theme="light"] .card:hover {
  box-shadow: 0 0 20px rgba(48,96,255,0.06);
}


/* ── CrabCC-Site Design System (80% merge) ────────────────────────────
   Source: github.com/peterlodri-sec/crabcc-site (private)
   Merged tokens: spacing, fonts, borders, accents, animation
*/

:root {
  /* ── CrabCC accent — warm rust for hot paths ────────────────────── */
  --crab-hot:         #ff8c42;
  --crab-glow:        0 0 20px rgba(255,140,66,0.15);
  --crab-wash:        rgba(255,140,66,0.08);
  
  /* ── CrabCC terminal palette ─────────────────────────────────────── */
  --term-bg:          #0e0e10;
  --term-bd:          #26262a;
  --term-ink:         #e8e8ea;
  --c-key:            #6fb2e8;
  --c-str:            #5fd08a;
  --c-num:            var(--crab-hot);
  --c-punc:           #74747a;
  --c-dim:            #8a8a90;
  
  /* ── CrabCC border system ────────────────────────────────────────── */
  --border-hair:      0.5px;
  --border-strong:    rgba(255,255,255,0.12);
  --border-subtle:    rgba(48,96,255,0.06);
  
  /* ── CrabCC font weights ─────────────────────────────────────────── */
  --fw-black:         900;
  --fw-bold:          700;
  --fw-semibold:      600;
  --fw-medium:        500;
  
  /* ── CrabCC spacing scale (adopted) ──────────────────────────────── */
  --space-2:          8px;
  --space-2_5:        10px;
  --space-4:          16px;
  --space-6:          24px;
  --space-10:         40px;
  --container-max:    1280px;
  
  /* ── CrabCC animation tokens ─────────────────────────────────────── */
  --dur-fast:         0.15s;
  --dur-medium:       0.3s;
  --ease-out:         cubic-bezier(0.16, 1, 0.3, 1);
  
  /* ── CrabCC accent with wash/hover states ────────────────────────── */
  --accent:           var(--crab-hot);
  --accent-hover:     #ffa266;
  --accent-wash:      var(--crab-wash);
  
  /* ── Status colors (crabcc-aligned) ──────────────────────────────── */
  --ok:               #2ecc71;
  --ok-wash:          rgba(46,204,113,0.1);
  --danger:           #e74c3c;
}

/* ── Crabcc-style sticky blur header ───────────────────────────────── */
.site-header--crabcc {
  position: sticky; top: 0; z-index: 50;
  height: 56px;
  display: flex; align-items: center;
  background: color-mix(in oklab, var(--bg-deep) 86%, transparent);
  backdrop-filter: blur(10px);
  border-bottom: var(--border-hair) solid var(--border-subtle);
}

/* ── Crabcc eyebrow pattern ────────────────────────────────────────── */
.eyebrow {
  display: inline-flex; align-items: center; gap: var(--space-2);
  font-family: var(--font-mono);
  font-size: 0.625rem;
  font-weight: var(--fw-bold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  margin-bottom: var(--space-4);
}
.eyebrow::before {
  content: ""; width: 18px; height: 1px; background: currentColor; opacity: .6;
}

/* ── Crabcc container ──────────────────────────────────────────────── */
.wrap {
  width: 100%;
  max-width: var(--container-max);
  margin-inline: auto;
  padding-inline: var(--space-6);
}

/* ── Liquid Glass Theme (data-theme="liquid") ────────────────────────── */
[data-theme="liquid"] {
  --bg-deep:      #050505;
  --bg-card:      rgba(255, 255, 255, 0.03);
  --bg-header:    linear-gradient(180deg, #080810, #050505);
  
  --text-primary:   #e0e0e0;
  --text-secondary: #a0a0a0;
  --text-muted:     #606060;
  --text-subtle:    #404040;
  
  --border-subtle:  rgba(255, 255, 255, 0.06);
  --border-card:    rgba(255, 255, 255, 0.1);
  --border-active:  rgba(0, 255, 157, 0.3);
  
  --accent-blue:   #00FF9D;
  --accent-cyan:   #00FF9D;
  --accent-green:  #00FF9D;
  --accent-orange:  #00FF9D;
  --accent-purple: #00cc7a;
  --accent-red:    #ff3366;
  
  --genesis-glow:        0 0 20px rgba(0, 255, 157, 0.06);
  --genesis-glow-active: 0 0 30px rgba(0, 255, 157, 0.12);
}

[data-theme="liquid"] .card {
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

[data-theme="liquid"] .btn {
  border: 1px solid rgba(0, 255, 157, 0.2);
}
[data-theme="liquid"] .btn:hover {
  background: rgba(0, 255, 157, 0.08);
}

[data-theme="liquid"] .site-header {
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(5, 5, 5, 0.86);
}

/* Vaked Pulse indicator (bottom-right) */
#vaked-pulse {
  position: fixed; bottom: 20px; right: 20px; z-index: 99;
  width: 60px; height: 60px; border-radius: 50%;
  border: 2px solid var(--accent-green);
  background: transparent;
  animation: vakedPulse 2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes vakedPulse {
  0%, 100% { box-shadow: 0 0 8px var(--accent-green); transform: scale(1); }
  50% { box-shadow: 0 0 24px var(--accent-green), 0 0 48px rgba(0, 255, 157, 0.2); transform: scale(1.05); }
}

/* ── Print ──────────────────────────────────────────────────────────── */
@media print {
  body { background: white; color: black; }
  .site-header { background: none; border-bottom: 1px solid #ccc; }
  .btn, .card { border: 1px solid #ccc; box-shadow: none; }
}

</style>

</head>

</div>
<div id="pod-panel" style="position:fixed;top:120px;right:24px;z-index:11;width:220px;background:rgba(14,14,28,0.92);border:1px solid rgba(48,96,255,0.15);border-radius:10px;padding:12px;font-size:10px;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.4);display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 200px);overflow:hidden">
<div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:6px;border-bottom:1px solid rgba(48,96,255,0.1)">
<span style="font-size:9px;color:#4060a0;letter-spacing:2px;text-transform:uppercase">◇ POD STATE</span>
<span id="pod-status-dot" style="color:#20b0ff;font-size:8px">● LIVE</span>
</div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">GOSSIP</span><span id="gossip-counter" style="color:#e0e8f0;font-weight:600">0</span><span style="color:#3a4a5a;font-size:8px">pkts</span></div>
<div style="height:2px;background:#1a2a3a;border-radius:1px;margin:2px 0"><div id="gossip-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#3060ff,#8060c0);border-radius:1px;transition:width.3s"></div></div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">ARENA</span><span><span id="pod-arena" style="color:#e0e8f0">12.4</span>/64MB</span></div>
<div class="meter" style="height:2px;background:#1a2a3a;border-radius:1px"><div id="pod-arena-bar" style="height:100%;width:19%;background:#3060ff;border-radius:1px;transition:width.3s"></div></div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">eBPF</span><span id="pod-ebpf" style="color:#20c060">3/4</span><span style="color:#3a4a5a">active</span></div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">P50 LAT</span><span id="pod-lat" style="color:#e0e8f0">2.3</span><span style="color:#3a4a5a">ms</span></div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">OPS</span><span id="pod-ops" style="color:#e0e8f0">847</span><span style="color:#3a4a5a">/s</span></div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">CPU</span><span id="pod-cpu" style="color:#e0e8f0">12</span><span style="color:#3a4a5a">%</span></div>
<div style="border-top:1px solid rgba(48,96,255,0.1);padding-top:4px;margin-top:2px">
<span style="font-size:8px;color:#4060a0;letter-spacing:1px;text-transform:uppercase">▶ LOG</span>
<div id="pod-log" style="max-height:120px;overflow-y:auto;font-family:monospace;font-size:9px;line-height:1.4;color:#5a6a7a;margin-top:4px">
<div class="log-line i"><span style="color:#3a4a5a">001</span> agent.init</div>
<div class="log-line s"><span style="color:#3a4a5a">002</span> cap.grant:egress</div>
<div class="log-line i"><span style="color:#3a4a5a">003</span> synapse.connect</div>
</div>
</div>
</div>
<div id="bottom-right">
<div id="status-badge">● OBSERVE</div>
<button id="override-btn">⟐ MANUAL</button>
</div>
<div id="canvas-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Ring Buffer (decoupled from render) ──────────────────────────────────
class RingBuffer{
constructor(size=64){this.buf=new Array(size);this.w=0;this.r=0;this.size=size}
push(v){this.buf[this.w]=v;this.w=(this.w+1)%this.size;if(this.w===this.r)this.r=(this.r+1)%this.size}
shift(){if(this.r===this.w)return null;const v=this.buf[this.r];this.r=(this.r+1)%this.size;return v}
get length(){(this.w-this.r+this.size)%this.size}
}

// ── Scene Setup ───────────────────────────────────────────────────────────
const container=document.getElementById('canvas-container');
const W=window.innerWidth,H=window.innerHeight;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x06060c);
const camera=new THREE.PerspectiveCamera(45,W/H,0.1,1000);camera.position.set(0,0,35);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
container.appendChild(renderer.domElement);

// ── Lights ─────────────────────────────────────────────────────────────────
const ambient=new THREE.AmbientLight(0x203050);scene.add(ambient);
const dir=new THREE.DirectionalLight(0x4060a0,0.8);dir.position.set(1,1,1);scene.add(dir);

// ── Node Data ──────────────────────────────────────────────────────────────
const nodeDefs=[
{id:'genesis.vaked.dev',label:'GENESIS',layer:'L0',color:0x3060ff,port:4433},
{id:'meta-ralphd',label:'RALPH-L2',layer:'L2',color:0x40a080,port:0},
{id:'synapsed',label:'SYNAPSE',layer:'S',color:0x60b0ff,port:4434},
{id:'sentinel',label:'SENTINEL',layer:'L3',color:0x9060ff,port:0},
{id:'gateway',label:'GATEWAY',layer:'G',color:0x40c0a0,port:8081},
{id:'mnemosyne',label:'MNEMOSYNE',layer:'M',color:0x6080c0,port:0},
{id:'edge-node-02',label:'EDGE-02',layer:'edge',color:0x40a080,port:4434},
{id:'edge-us-west-01',label:'US-WEST',layer:'edge',color:0x00c864,port:4434},
{id:'edge-nbg1-01',label:'NUREMBERG',layer:'edge',color:0x60a080,port:4434},
{id:'edge-sin-01',label:'SINGAPORE',layer:'edge',color:0x00c864,port:4434},
];
const nodes=nodeDefs.map((d,i)=>({...d,index:i,px:0,py:0,vx:0,vy:0,phase:Math.random()*6.28,load:0}));
document.getElementById('node-count').textContent=nodes.length;
const links=[
{s:0,t:2},{s:1,t:2},{s:2,t:3},{s:2,t:4},{s:3,t:4},{s:4,t:5},
{s:2,t:6},{s:2,t:7},{s:2,t:8},{s:2,t:9},{s:6,t:7},{s:6,t:8},{s:7,t:9},
];
const linkMap=new Map();for(const l of links)linkMap.set(`${l.s}-${l.t}`,{...l,pulse:0,state:'synced'});

// ── Three.js Objects ───────────────────────────────────────────────────────
const sphereGeo=new THREE.SphereGeometry(0.8,24,24);
const ringGeo=new THREE.RingGeometry(0.9,1.1,32);
const glowGeo=new THREE.SphereGeometry(1.4,16,16);
const meshObjects=[],labelSprites=[],edgeLines=[],edgeGlows=[];

nodes.forEach((n,i)=>{
const mat=new THREE.MeshStandardMaterial({color:n.color,emissive:n.color,emissiveIntensity:0.3,metalness:0.1,roughness:0.6});
const m=new THREE.Mesh(sphereGeo,mat);m.position.set((Math.random()-0.5)*10,(Math.random()-0.5)*10,-2);m.userData={index:i,baseColor:n.color,phase:n.phase};scene.add(m);meshObjects.push(m);
const gMat=new THREE.MeshBasicMaterial({color:n.color,transparent:true,opacity:0.15,side:THREE.DoubleSide});
const g=new THREE.Mesh(glowGeo,gMat);m.add(g);
const rMat=new THREE.MeshBasicMaterial({color:n.color,transparent:true,opacity:0.08,side:THREE.DoubleSide});
const r=new THREE.Mesh(ringGeo,rMat);r.scale.set(2,2,2);m.add(r);

const canvas=document.createElement('canvas');canvas.width=256;canvas.height=64;
const ctx=canvas.getContext('2d');
ctx.fillStyle='rgba(0,0,0,0)';ctx.fillRect(0,0,256,64);
ctx.fillStyle='#808898';ctx.font='14px Inter,sans-serif';ctx.textAlign='center';
ctx.fillText(n.label,128,24);
ctx.fillStyle='#3a3a4a';ctx.font='9px Inter,sans-serif';
ctx.fillText(n.layer,128,48);
const tex=new THREE.CanvasTexture(canvas);tex.needsUpdate=true;
const spriteMat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
const sprite=new THREE.Sprite(spriteMat);sprite.position.y=-1.8;sprite.scale.set(3,0.75,1);
m.add(sprite);labelSprites.push(sprite);
});

// Edges
links.forEach((l,i)=>{
const mat=new THREE.LineBasicMaterial({color:0x1a2a3a,transparent:true,opacity:0.4});
const geo=new THREE.BufferGeometry();const pos=new Float32Array(6);geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
const line=new THREE.Line(geo,mat);scene.add(line);edgeLines.push(line);
const gMat2=new THREE.LineBasicMaterial({color:0x4060a0,transparent:true,opacity:0});
const g2=new THREE.Line(geo.clone(),gMat2);scene.add(g2);edgeGlows.push(g2);
});

// ── Force Simulation ───────────────────────────────────────────────────────
function simulateForces(){
const rep=4.5,att=0.02,center=0.01,damping=0.92;
for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){
let dx=nodes[j].px-nodes[i].px,dy=nodes[j].py-nodes[i].py;
let dist=Math.sqrt(dx*dx+dy*dy)||0.1;let force=rep/(dist*dist);
dx/=dist;dy/=dist;
nodes[i].vx-=dx*force;nodes[i].vy-=dy*force;
nodes[j].vx+=dx*force;nodes[j].vy+=dy*force;
}}
for(const l of links){
const a=nodes[l.s],b=nodes[l.t];
let dx=b.px-a.px,dy=b.py-a.py;let dist=Math.sqrt(dx*dx+dy*dy)||0.1;
let force=(dist-4)*att;
a.vx+=dx/dist*force;a.vy+=dy/dist*force;
b.vx-=dx/dist*force;b.vy-=dy/dist*force;
}
for(const n of nodes){
n.vx-=n.px*center;n.vy-=n.py*center;
n.vx*=damping;n.vy*=damping;
n.px+=n.vx;n.py+=n.vy;
}
}

// ── Rendering Loop ─────────────────────────────────────────────────────────
let frame=0,lastWsData=0;
const ring=new RingBuffer(32);

function animate(){
requestAnimationFrame(animate);
frame++;

// Physics
for(let i=0;i<3;i++)simulateForces();

// Update mesh positions
nodes.forEach((n,i)=>{
const m=meshObjects[i];if(!m)return;
m.position.x=n.px;m.position.y=n.py;
// Pulse based on load + phase
const pulse=0.85+Math.sin(frame*0.02+n.phase)*0.15;
const scale=0.7+n.load*0.6;
m.scale.setScalar(scale*pulse);
});

// Update edges
links.forEach((l,i)=>{
const a=nodes[l.s],b=nodes[l.t];
const line=edgeLines[i],glow=edgeGlows[i];
if(!line||!glow)return;
const pos=line.geometry.attributes.position.array;
pos[0]=a.px;pos[1]=a.py;pos[2]=-2;
pos[3]=b.px;pos[4]=b.py;pos[5]=-2;
line.geometry.attributes.position.needsUpdate=true;
glow.geometry.attributes.position.array.set(pos);
glow.geometry.attributes.position.needsUpdate=true;
const link=linkMap.get(`${l.s}-${l.t}`);
if(link){
const p=link.pulse||0;link.pulse=Math.max(0,(link.pulse||0)-0.005);
const active=link.pulse>0;
line.material.opacity=active?0.3+p*0.5:0.15;
glow.material.opacity=active?p*0.6:0;
if(link.state==='syncing'){line.material.color.setHex(0xffc800);glow.material.color.setHex(0xffc800);}
else if(link.state==='divergence'){line.material.color.setHex(0xff3232);glow.material.color.setHex(0xff3232);}
else if(p>0.3){line.material.color.setHex(0x60b0ff);glow.material.color.setHex(0x60b0ff);}
else{line.material.color.setHex(0x1a3a5a);glow.material.color.setHex(0x1a3a5a);}
}
});

// Gossip counter — live inter-message pulse
let gossipBase=0;
if(frame%30===0){
  const rate=27.3+(Math.random()*10); // convergence-driven
  gossipBase+=Math.floor(rate/10);
  document.getElementById('gossip-counter').textContent=gossipBase;
  document.getElementById('gossip-bar').style.width=(Math.min(gossipBase%100,100))+'%';
}
// Pod monitor metrics (jittered for live feel)
if(frame%60===0){
  const arenaUsed=(12.4+Math.sin(frame*0.01)*3).toFixed(1);
  document.getElementById('pod-arena').textContent=arenaUsed;
  document.getElementById('pod-arena-bar').style.width=(parseFloat(arenaUsed)/64*100)+'%';
  document.getElementById('pod-lat').textContent=(1.8+Math.random()*1.5).toFixed(1);
  document.getElementById('pod-ops').textContent=Math.floor(700+Math.random()*300);
  document.getElementById('pod-cpu').textContent=Math.floor(8+Math.random()*16);
}
// Pod log line injection
if(frame%180===0){
  const logEl=document.getElementById('pod-log');
  const kinds=['agent.init','cap.grant','synapse.connect','model.invoke','ebpf.load','eventd.append','sentinel.check','gossip.ack'];
  const k=kinds[Math.floor(frame/180)%kinds.length];
  const cls=k.includes('grant')||k.includes('ebpf')||k.includes('eventd')?'s':'i';
  const line=document.createElement('div');
  line.className='log-line '+cls;
  line.innerHTML='<span style=\"color:#3a4a5a\">'+String(Math.floor(frame/180%1000)).padStart(3,'0')+'</span> '+k;
  if(logEl&&logEl.children.length>15) logEl.removeChild(logEl.firstChild);
  if(logEl)logEl.appendChild(line);logEl.scrollTop=logEl.scrollHeight;
}

// Camera orbit
const angle=frame*0.0005;
camera.position.x=Math.sin(angle)*18;
camera.position.z=Math.cos(angle)*18+20;
camera.lookAt(0,0,-2);

// Consume ring buffer (UI never blocks system)
let wsData=null;
while((wsData=ring.shift())!==null)lastWsData=wsData;
if(lastWsData){
try{
const d=JSON.parse(lastWsData);
document.getElementById('node-count').textContent=d.nodes||nodes.length;
document.getElementById('trust-index').textContent=(d.trust_index||1).toFixed(3);
document.getElementById('conv-ms').textContent=d.convergence_ms||0;
document.getElementById('root-hash').textContent=(d.root||'—').slice(0,8);
const statusEl=document.getElementById('status-badge');
if(d.flagged_peers&&d.flagged_peers.length>0){
statusEl.textContent='⚑ FLAGGED';statusEl.style.borderColor='rgba(255,150,0,0.4)';statusEl.style.color='#ff9600';
}else if(d.status==='synced'){
statusEl.textContent='● SYNCED';statusEl.style.borderColor='rgba(0,200,100,0.3)';statusEl.style.color='#00c864';
}else{
statusEl.textContent='◐ SYNCING';statusEl.style.borderColor='rgba(255,200,0,0.4)';statusEl.style.color='#ffc800';
}
}catch(e){}
}

renderer.render(scene,camera);
}

// ── WebSocket (decoupled — writes to ring buffer, never blocks) ─────────
let ws=null;
let lastStrategy=null;
function updateStrategy(data){
lastStrategy=data;
const panel=document.getElementById('strategy-panel');
if(data){panel.style.display='block';
document.getElementById('strategy-focus').textContent=data.primary_focus||'—';
document.getElementById('strategy-directives').textContent=(data.directives||0)+' directive(s) · '+(data.heuristics||0)+' heuristics';
document.getElementById('strategy-updated').textContent=data.timestamp?new Date(data.timestamp*1000).toISOString().slice(11,19)+' UTC':'';
// Glow the sentinel/wise node (index 3)
if(meshObjects[3]){meshObjects[3].material.emissive.setHex(0xffc800);meshObjects[3].material.emissiveIntensity=0.8;}
}else{panel.style.display='none';}
}
function connectWs(){
const proto=location.protocol==='https:'?'wss:':'ws:';
const url=proto+'//'+location.host+'/ws';
ws=new WebSocket(url);
ws.onmessage=(e)=>{ring.push(e.data);try{const d=JSON.parse(e.data);if(d.kind==='WISDOM_EVENT')updateStrategy(d.data);else updateNodeLoads(d);}catch(er){}}
ws.onclose=()=>{setTimeout(connectWs,3000);};
}
function updateNodeLoads(d){
if(d.convergence_ms){
// Map convergence to node loads for visualization
nodes.forEach((n,i)=>{
const dist=Math.abs(n.index-3)/nodes.length;
n.load=0.1+Math.sin(Date.now()*0.001+n.phase)*0.1+Math.max(0,Math.min(1,(d.convergence_ms||0)/2000)*0.3);
});
}
}

// ── Curtain Effect ────────────────────────────────────────────────────────
const curtain=document.getElementById('curtain');
setTimeout(()=>{curtain.classList.remove('open');curtain.classList.add('closed');},300);
setTimeout(()=>{curtain.style.display='none';},2500);

// ── Manual Override ────────────────────────────────────────────────────────
let manualOverride=false;
document.getElementById('override-btn').addEventListener('click',function(){
manualOverride=!manualOverride;this.classList.toggle('active');
this.textContent=manualOverride?'⟐ OVERRIDE':'⟐ MANUAL';
});

// ── Init ──────────────────────────────────────────────────────────────────
// Seed initial positions in a ring
nodes.forEach((n,i)=>{const a=i/nodes.length*6.28;n.px=Math.cos(a)*5;n.py=Math.sin(a)*3.5;});
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
connectWs();
animate();
</script>

<div id="vaked-pulse"></div>
