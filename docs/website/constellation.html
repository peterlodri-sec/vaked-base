<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vaked — The Constellation</title>
<link rel="stylesheet" href="/vaked-theme.css">
<style>
/* ── Constellation · crabcc sentinel-console language ──────────────────
   Swallowed from crabcc.app design system: #0e0e10 ground, JetBrains Mono
   display, orange (#ff8c42) accent, pill HUD chips, hairline borders,
   green-pulse liveness. Graph (THREE.js) untouched. */
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
:root{
  --crab-bg:#0e0e10; --crab-800:#161618; --crab-700:#2a2a2c;
  --crab-hot:#ff8c42; --crab-glow:#ffb380; --crab-500:#d35400;
  --c-green:#2ecc71; --c-amber:#f5a623; --c-red:#e74c3c; --c-blue:#2c6fb0;
  --c-text:#e8e6e3; --c-muted:#8a8a86; --c-faint:#5a5a58;
  --c-line:rgba(255,255,255,0.07); --c-line-2:rgba(255,140,66,0.32);
  --c-wash:rgba(255,140,66,0.09);
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --sans:'IBM Plex Sans',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--crab-bg);overflow:hidden;font-family:var(--mono);color:var(--c-text);-webkit-font-smoothing:antialiased}
::selection{background:rgba(255,140,66,0.35)}
#curtain{position:fixed;inset:0;z-index:100;pointer-events:none;backdrop-filter:blur(0px);transition:backdrop-filter 2s var(--ease),opacity 2s var(--ease)}
#curtain.open{backdrop-filter:blur(20px) saturate(0.3);opacity:0;pointer-events:none}
#curtain.closed{backdrop-filter:blur(4px) saturate(0.5);opacity:1}
#ui{position:fixed;z-index:10;pointer-events:none}

/* top-left wordmark — crabcc display lockup */
#top-left{position:fixed;top:20px;left:22px;z-index:11}
#top-left h1{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--crab-hot);margin:0}
#top-left .sub{font-size:10px;color:var(--c-faint);letter-spacing:1px}

/* top-right meters — tabular pills, glowing values */
#top-right{position:fixed;top:18px;right:22px;z-index:11;text-align:right}
#top-right .node-count{font-size:28px;font-weight:700;color:var(--crab-glow)!important;font-variant-numeric:tabular-nums;text-shadow:0 0 16px rgba(255,140,66,0.35)}
#top-right #conv-ms{font-weight:700!important;color:var(--c-text)!important;font-variant-numeric:tabular-nums}
#top-right #trust-index{font-weight:700!important;color:var(--c-green)!important;font-variant-numeric:tabular-nums}
#top-right .node-label{font-size:10px;color:var(--c-faint);letter-spacing:1px}

#bottom-left{position:fixed;bottom:22px;left:22px;z-index:11}
#bottom-left .trust{font-size:11px;color:var(--c-muted);font-variant-numeric:tabular-nums}
#bottom-left .trust span{color:var(--c-text)}

#bottom-right{position:fixed;bottom:22px;right:22px;z-index:11;display:flex;gap:8px;align-items:center}
#override-btn{font-family:var(--mono);padding:6px 13px;border-radius:999px;border:1px solid var(--c-line);background:transparent;color:var(--c-muted);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 140ms var(--ease);pointer-events:auto}
#override-btn:hover{border-color:var(--crab-hot);color:var(--crab-glow);background:var(--c-wash)}
#override-btn.active{border-color:var(--crab-hot);color:var(--crab-hot);background:var(--c-wash);box-shadow:0 0 18px rgba(255,140,66,0.25)}

/* status pill — green-pulse liveness, the crabcc conn dot */
#status-badge{padding:4px 11px;border-radius:999px;font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;background:rgba(46,204,113,0.10);border:1px solid rgba(46,204,113,0.30);color:var(--c-green)}
#status-badge::first-letter{}
@keyframes crabpulse{0%{opacity:1}50%{opacity:.35}100%{opacity:1}}
#status-badge{animation:crabpulse 1.6s var(--ease) infinite}

#canvas-container{width:100vw;height:100vh;position:fixed;top:0;left:0}

/* pod log lines — semantic hairline accents */
.log-line.i{border-left:1px solid var(--c-blue);padding-left:5px}
.log-line.s{border-left:1px solid var(--c-green);padding-left:5px;color:var(--c-green)}
.log-line.e{border-left:1px solid var(--c-red);padding-left:5px;color:var(--c-red)}
.log-line.w{border-left:1px solid var(--c-amber);padding-left:5px;color:var(--c-amber)}

.crabcc-accent{color:var(--crab-hot)}
</style>

</head>
<body>
<div id="curtain" class="open"></div>
<div id="top-left">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff">✦</div>
    <div><div style="font-size:15px;font-weight:600;color:var(--text-primary);letter-spacing:1px">Constellation</div>
    <div style="font-size:10px;color:var(--text-muted);letter-spacing:2px">VAKED SWARM · REAL-TIME MESH</div></div>
  </div>
</div>
<div id="top-right">
  <div style="display:flex;gap:24px;align-items:flex-end">
    <div style="text-align:right"><div class="node-count" id="node-count" style="font-size:28px;font-weight:300;color:var(--text-primary)">0</div><div style="font-size:9px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase">Nodes</div></div>
    <div style="text-align:right"><div id="conv-ms" style="font-size:22px;font-weight:300;color:#60b0ff">0</div><div style="font-size:9px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase">Convergence</div></div>
    <div style="text-align:right"><div id="trust-index" style="font-size:22px;font-weight:300;color:var(--accent-green)">1.000</div><div style="font-size:9px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase">Trust</div></div>
  </div>
</div>
<div id="strategy-panel" style="position:fixed;bottom:80px;left:24px;z-index:11;background:rgba(14,14,28,0.92);border:1px solid rgba(128,96,192,0.25);border-radius:10px;padding:16px 20px;min-width:280px;display:none;font-size:11px;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.4)">
<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
<div style="width:16px;height:16px;border-radius:4px;background:linear-gradient(135deg,var(--accent-purple),var(--accent-blue));font-size:8px;display:flex;align-items:center;justify-content:center;color:#fff">✦</div>
<div style="font-size:10px;color:#9080b0;letter-spacing:2px;text-transform:uppercase">Strategic Focus</div>
</div>
<div id="strategy-focus" style="color:var(--text-primary);font-size:16px;font-weight:600;margin-bottom:4px">—</div>
<div id="strategy-directives" style="color:#6a7a8a;font-size:11px;margin-top:6px;line-height:1.5"></div>
<div id="strategy-updated" style="color:var(--text-subtle);font-size:9px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(128,96,192,0.1)"></div>
</div>
<div style="position:fixed;top:8px;right:8px;z-index:99;font-size:9px"><button onclick="document.body.dataset.font=document.body.dataset.font==='mono'?'':'mono'" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);padding:2px 6px;border-radius:3px;cursor:pointer;font:inherit">◫</button></div>
<div id="bottom-left">
  <div style="display:flex;gap:16px;align-items:center">
    <div style="font-size:10px;color:var(--text-muted)"><span style="color:var(--text-primary)" id="root-hash">—</span></div>
    <div id="status-badge" style="padding:3px 10px;border-radius:4px;font-size:9px;letter-spacing:1px;background:rgba(0,200,100,0.1);border:1px solid rgba(0,200,100,0.2);color:var(--accent-green)">● SYNCED</div>
  </div>
</div>
<div id="pod-panel" style="position:fixed;top:120px;right:24px;z-index:11;width:220px;background:rgba(14,14,28,0.92);border:1px solid var(--border-active);border-radius:10px;padding:12px;font-size:10px;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.4);display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 200px);overflow:hidden">
<div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:6px;border-bottom:1px solid rgba(48,96,255,0.1)">
<span style="font-size:9px;color:var(--accent-blue);letter-spacing:2px;text-transform:uppercase">◇ POD STATE</span>
<span id="pod-status-dot" style="color:var(--accent-cyan);font-size:8px">● LIVE</span>
</div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">GOSSIP</span><span id="gossip-counter" style="color:var(--text-primary);font-weight:600">0</span><span style="color:var(--text-subtle);font-size:8px">pkts</span></div>
<div style="height:2px;background:#1a2a3a;border-radius:1px;margin:2px 0"><div id="gossip-bar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple));border-radius:1px;transition:width.3s"></div></div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">ARENA</span><span><span id="pod-arena" style="color:var(--text-primary)">12.4</span>/64MB</span></div>
<div class="meter" style="height:2px;background:#1a2a3a;border-radius:1px"><div id="pod-arena-bar" style="height:100%;width:19%;background:var(--accent-blue);border-radius:1px;transition:width.3s"></div></div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">eBPF</span><span id="pod-ebpf" style="color:#20c060">3/4</span><span style="color:var(--text-subtle)">active</span></div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">P50 LAT</span><span id="pod-lat" style="color:var(--text-primary)">2.3</span><span style="color:var(--text-subtle)">ms</span></div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">OPS</span><span id="pod-ops" style="color:var(--text-primary)">847</span><span style="color:var(--text-subtle)">/s</span></div>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a6a7a">CPU</span><span id="pod-cpu" style="color:var(--text-primary)">12</span><span style="color:var(--text-subtle)">%</span></div>
<div style="border-top:1px solid rgba(48,96,255,0.1);padding-top:4px;margin-top:2px">
<span style="font-size:8px;color:var(--accent-blue);letter-spacing:1px;text-transform:uppercase">▶ LOG</span>
<div id="pod-log" style="max-height:120px;overflow-y:auto;font-family:var(--font-mono);font-size:9px;line-height:1.4;color:#5a6a7a;margin-top:4px">
<div class="log-line i"><span style="color:var(--text-subtle)">001</span> agent.init</div>
<div class="log-line s"><span style="color:var(--text-subtle)">002</span> cap.grant:egress</div>
<div class="log-line i"><span style="color:var(--text-subtle)">003</span> synapse.connect</div>
</div>
</div>
</div>
<div id="bottom-right">
<div id="status-badge">● OBSERVE</div>
<button id="override-btn">⟐ MANUAL</button>
</div>
<div id="canvas-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Ring Buffer (decoupled from render) ──────────────────────────────────
class RingBuffer{
constructor(size=64){this.buf=new Array(size);this.w=0;this.r=0;this.size=size}
push(v){this.buf[this.w]=v;this.w=(this.w+1)%this.size;if(this.w===this.r)this.r=(this.r+1)%this.size}
shift(){if(this.r===this.w)return null;const v=this.buf[this.r];this.r=(this.r+1)%this.size;return v}
get length(){(this.w-this.r+this.size)%this.size}
}

// ── Scene Setup ───────────────────────────────────────────────────────────
const container=document.getElementById('canvas-container');
const W=window.innerWidth,H=window.innerHeight;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x06060c);
const camera=new THREE.PerspectiveCamera(45,W/H,0.1,1000);camera.position.set(0,0,35);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
container.appendChild(renderer.domElement);

// ── Lights ─────────────────────────────────────────────────────────────────
const ambient=new THREE.AmbientLight(0x203050);scene.add(ambient);
const dir=new THREE.DirectionalLight(0x4060a0,0.8);dir.position.set(1,1,1);scene.add(dir);

// ── Node Data ──────────────────────────────────────────────────────────────
const nodeDefs=[
{id:'genesis.vaked.dev',label:'GENESIS',layer:'L0',color:0x3060ff,port:4433},
{id:'meta-ralphd',label:'RALPH-L2',layer:'L2',color:0x40a080,port:0},
{id:'synapsed',label:'SYNAPSE',layer:'S',color:0x60b0ff,port:4434},
{id:'sentinel',label:'SENTINEL',layer:'L3',color:0x9060ff,port:0},
{id:'gateway',label:'GATEWAY',layer:'G',color:0x40c0a0,port:8081},
{id:'mnemosyne',label:'MNEMOSYNE',layer:'M',color:0x6080c0,port:0},
{id:'edge-node-02',label:'EDGE-02',layer:'edge',color:0x40a080,port:4434},
{id:'edge-us-west-01',label:'US-WEST',layer:'edge',color:0x00c864,port:4434},
{id:'edge-nbg1-01',label:'NUREMBERG',layer:'edge',color:0x60a080,port:4434},
{id:'edge-sin-01',label:'SINGAPORE',layer:'edge',color:0x00c864,port:4434},
];
const nodes=nodeDefs.map((d,i)=>({...d,index:i,px:0,py:0,vx:0,vy:0,phase:Math.random()*6.28,load:0}));
document.getElementById('node-count').textContent=nodes.length;
const links=[
{s:0,t:2},{s:1,t:2},{s:2,t:3},{s:2,t:4},{s:3,t:4},{s:4,t:5},
{s:2,t:6},{s:2,t:7},{s:2,t:8},{s:2,t:9},{s:6,t:7},{s:6,t:8},{s:7,t:9},
];
const linkMap=new Map();for(const l of links)linkMap.set(`${l.s}-${l.t}`,{...l,pulse:0,state:'synced'});

// ── Three.js Objects ───────────────────────────────────────────────────────
const sphereGeo=new THREE.SphereGeometry(0.8,24,24);
const ringGeo=new THREE.RingGeometry(0.9,1.1,32);
const glowGeo=new THREE.SphereGeometry(1.4,16,16);
const meshObjects=[],labelSprites=[],edgeLines=[],edgeGlows=[];

nodes.forEach((n,i)=>{
const mat=new THREE.MeshStandardMaterial({color:n.color,emissive:n.color,emissiveIntensity:0.3,metalness:0.1,roughness:0.6});
const m=new THREE.Mesh(sphereGeo,mat);m.position.set((Math.random()-0.5)*10,(Math.random()-0.5)*10,-2);m.userData={index:i,baseColor:n.color,phase:n.phase};scene.add(m);meshObjects.push(m);
const gMat=new THREE.MeshBasicMaterial({color:n.color,transparent:true,opacity:0.15,side:THREE.DoubleSide});
const g=new THREE.Mesh(glowGeo,gMat);m.add(g);
const rMat=new THREE.MeshBasicMaterial({color:n.color,transparent:true,opacity:0.08,side:THREE.DoubleSide});
const r=new THREE.Mesh(ringGeo,rMat);r.scale.set(2,2,2);m.add(r);

const canvas=document.createElement('canvas');canvas.width=256;canvas.height=64;
const ctx=canvas.getContext('2d');
ctx.fillStyle='rgba(0,0,0,0)';ctx.fillRect(0,0,256,64);
ctx.fillStyle='#808898';ctx.font='14px Inter,sans-serif';ctx.textAlign='center';
ctx.fillText(n.label,128,24);
ctx.fillStyle='#3a3a4a';ctx.font='9px Inter,sans-serif';
ctx.fillText(n.layer,128,48);
const tex=new THREE.CanvasTexture(canvas);tex.needsUpdate=true;
const spriteMat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
const sprite=new THREE.Sprite(spriteMat);sprite.position.y=-1.8;sprite.scale.set(3,0.75,1);
m.add(sprite);labelSprites.push(sprite);
});

// Edges
links.forEach((l,i)=>{
const mat=new THREE.LineBasicMaterial({color:0x1a2a3a,transparent:true,opacity:0.4});
const geo=new THREE.BufferGeometry();const pos=new Float32Array(6);geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
const line=new THREE.Line(geo,mat);scene.add(line);edgeLines.push(line);
const gMat2=new THREE.LineBasicMaterial({color:0x4060a0,transparent:true,opacity:0});
const g2=new THREE.Line(geo.clone(),gMat2);scene.add(g2);edgeGlows.push(g2);
});

// ── Force Simulation ───────────────────────────────────────────────────────
function simulateForces(){
const rep=4.5,att=0.02,center=0.01,damping=0.92;
for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){
let dx=nodes[j].px-nodes[i].px,dy=nodes[j].py-nodes[i].py;
let dist=Math.sqrt(dx*dx+dy*dy)||0.1;let force=rep/(dist*dist);
dx/=dist;dy/=dist;
nodes[i].vx-=dx*force;nodes[i].vy-=dy*force;
nodes[j].vx+=dx*force;nodes[j].vy+=dy*force;
}}
for(const l of links){
const a=nodes[l.s],b=nodes[l.t];
let dx=b.px-a.px,dy=b.py-a.py;let dist=Math.sqrt(dx*dx+dy*dy)||0.1;
let force=(dist-4)*att;
a.vx+=dx/dist*force;a.vy+=dy/dist*force;
b.vx-=dx/dist*force;b.vy-=dy/dist*force;
}
for(const n of nodes){
n.vx-=n.px*center;n.vy-=n.py*center;
n.vx*=damping;n.vy*=damping;
n.px+=n.vx;n.py+=n.vy;
}
}

// ── Rendering Loop ─────────────────────────────────────────────────────────
let frame=0,lastWsData=0;
const ring=new RingBuffer(32);

function animate(){
requestAnimationFrame(animate);
frame++;

// Physics
for(let i=0;i<3;i++)simulateForces();

// Update mesh positions
nodes.forEach((n,i)=>{
const m=meshObjects[i];if(!m)return;
m.position.x=n.px;m.position.y=n.py;
// Pulse based on load + phase
const pulse=0.85+Math.sin(frame*0.02+n.phase)*0.15;
const scale=0.7+n.load*0.6;
m.scale.setScalar(scale*pulse);
});

// Update edges
links.forEach((l,i)=>{
const a=nodes[l.s],b=nodes[l.t];
const line=edgeLines[i],glow=edgeGlows[i];
if(!line||!glow)return;
const pos=line.geometry.attributes.position.array;
pos[0]=a.px;pos[1]=a.py;pos[2]=-2;
pos[3]=b.px;pos[4]=b.py;pos[5]=-2;
line.geometry.attributes.position.needsUpdate=true;
glow.geometry.attributes.position.array.set(pos);
glow.geometry.attributes.position.needsUpdate=true;
const link=linkMap.get(`${l.s}-${l.t}`);
if(link){
const p=link.pulse||0;link.pulse=Math.max(0,(link.pulse||0)-0.005);
const active=link.pulse>0;
line.material.opacity=active?0.3+p*0.5:0.15;
glow.material.opacity=active?p*0.6:0;
if(link.state==='syncing'){line.material.color.setHex(0xffc800);glow.material.color.setHex(0xffc800);}
else if(link.state==='divergence'){line.material.color.setHex(0xff3232);glow.material.color.setHex(0xff3232);}
else if(p>0.3){line.material.color.setHex(0x60b0ff);glow.material.color.setHex(0x60b0ff);}
else{line.material.color.setHex(0x1a3a5a);glow.material.color.setHex(0x1a3a5a);}
}
});

// Gossip counter — live inter-message pulse
let gossipBase=0;
if(frame%30===0){
  const rate=27.3+(Math.random()*10); // convergence-driven
  gossipBase+=Math.floor(rate/10);
  document.getElementById('gossip-counter').textContent=gossipBase;
  document.getElementById('gossip-bar').style.width=(Math.min(gossipBase%100,100))+'%';
}
// Pod monitor metrics (jittered for live feel)
if(frame%60===0){
  const arenaUsed=(12.4+Math.sin(frame*0.01)*3).toFixed(1);
  document.getElementById('pod-arena').textContent=arenaUsed;
  document.getElementById('pod-arena-bar').style.width=(parseFloat(arenaUsed)/64*100)+'%';
  document.getElementById('pod-lat').textContent=(1.8+Math.random()*1.5).toFixed(1);
  document.getElementById('pod-ops').textContent=Math.floor(700+Math.random()*300);
  document.getElementById('pod-cpu').textContent=Math.floor(8+Math.random()*16);
}
// Pod log line injection
if(frame%180===0){
  const logEl=document.getElementById('pod-log');
  const kinds=['agent.init','cap.grant','synapse.connect','model.invoke','ebpf.load','eventd.append','sentinel.check','gossip.ack'];
  const k=kinds[Math.floor(frame/180)%kinds.length];
  const cls=k.includes('grant')||k.includes('ebpf')||k.includes('eventd')?'s':'i';
  const line=document.createElement('div');
  line.className='log-line '+cls;
  line.innerHTML='<span style=\"color:#3a4a5a\">'+String(Math.floor(frame/180%1000)).padStart(3,'0')+'</span> '+k;
  if(logEl&&logEl.children.length>15) logEl.removeChild(logEl.firstChild);
  if(logEl)logEl.appendChild(line);logEl.scrollTop=logEl.scrollHeight;
}

// Camera orbit
const angle=frame*0.0005;
camera.position.x=Math.sin(angle)*18;
camera.position.z=Math.cos(angle)*18+20;
camera.lookAt(0,0,-2);

// Consume ring buffer (UI never blocks system)
let wsData=null;
while((wsData=ring.shift())!==null)lastWsData=wsData;
if(lastWsData){
try{
const d=JSON.parse(lastWsData);
document.getElementById('node-count').textContent=d.nodes||nodes.length;
document.getElementById('trust-index').textContent=(d.trust_index||1).toFixed(3);
document.getElementById('conv-ms').textContent=d.convergence_ms||0;
document.getElementById('root-hash').textContent=(d.root||'—').slice(0,8);
const statusEl=document.getElementById('status-badge');
if(d.flagged_peers&&d.flagged_peers.length>0){
statusEl.textContent='⚑ FLAGGED';statusEl.style.borderColor='rgba(255,150,0,0.4)';statusEl.style.color='#ff9600';
}else if(d.status==='synced'){
statusEl.textContent='● SYNCED';statusEl.style.borderColor='rgba(0,200,100,0.3)';statusEl.style.color='#00c864';
}else{
statusEl.textContent='◐ SYNCING';statusEl.style.borderColor='rgba(255,200,0,0.4)';statusEl.style.color='#ffc800';
}
}catch(e){}
}

renderer.render(scene,camera);
}

// ── WebSocket (decoupled — writes to ring buffer, never blocks) ─────────
let ws=null;
let lastStrategy=null;
function updateStrategy(data){
lastStrategy=data;
const panel=document.getElementById('strategy-panel');
if(data){panel.style.display='block';
document.getElementById('strategy-focus').textContent=data.primary_focus||'—';
document.getElementById('strategy-directives').textContent=(data.directives||0)+' directive(s) · '+(data.heuristics||0)+' heuristics';
document.getElementById('strategy-updated').textContent=data.timestamp?new Date(data.timestamp*1000).toISOString().slice(11,19)+' UTC':'';
// Glow the sentinel/wise node (index 3)
if(meshObjects[3]){meshObjects[3].material.emissive.setHex(0xffc800);meshObjects[3].material.emissiveIntensity=0.8;}
}else{panel.style.display='none';}
}
function connectWs(){
const proto=location.protocol==='https:'?'wss:':'ws:';
const url=proto+'//'+location.host+'/ws';
ws=new WebSocket(url);
ws.onmessage=(e)=>{ring.push(e.data);try{const d=JSON.parse(e.data);if(d.kind==='WISDOM_EVENT')updateStrategy(d.data);else updateNodeLoads(d);}catch(er){}}
ws.onclose=()=>{setTimeout(connectWs,3000);};
}
function updateNodeLoads(d){
if(d.convergence_ms){
// Map convergence to node loads for visualization
nodes.forEach((n,i)=>{
const dist=Math.abs(n.index-3)/nodes.length;
n.load=0.1+Math.sin(Date.now()*0.001+n.phase)*0.1+Math.max(0,Math.min(1,(d.convergence_ms||0)/2000)*0.3);
});
}
}

// ── Curtain Effect ────────────────────────────────────────────────────────
const curtain=document.getElementById('curtain');
setTimeout(()=>{curtain.classList.remove('open');curtain.classList.add('closed');},300);
setTimeout(()=>{curtain.style.display='none';},2500);

// ── Manual Override ────────────────────────────────────────────────────────
let manualOverride=false;
document.getElementById('override-btn').addEventListener('click',function(){
manualOverride=!manualOverride;this.classList.toggle('active');
this.textContent=manualOverride?'⟐ OVERRIDE':'⟐ MANUAL';
});

// ── Init ──────────────────────────────────────────────────────────────────
// Seed initial positions in a ring
nodes.forEach((n,i)=>{const a=i/nodes.length*6.28;n.px=Math.cos(a)*5;n.py=Math.sin(a)*3.5;});
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
connectWs();
animate();
</script>
