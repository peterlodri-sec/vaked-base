<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vaked-FM — Pulse Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08081a;color:#c8d0e0;font-family:'Inter','SF Pro',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:30px;padding:40px;user-select:none}
.header{text-align:center}
.header h1{font-size:11px;color:#4060a0;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px}
.header .title{font-size:36px;font-weight:100;color:#e0e8f0;letter-spacing:12px;text-transform:uppercase}
.header .sub{font-size:10px;color:#5a5a7a;margin-top:4px}
#scope{width:100%;max-width:600px;height:100px;border:1px solid rgba(48,96,255,0.12);border-radius:6px;background:#0c0c20;position:relative;overflow:hidden}
.bar{width:100%;max-width:600px;height:2px;background:#1a2a3a;border-radius:1px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#3060ff,#8060c0);transition:width .5s}
.meta{text-align:center;font-size:10px;color:#5a5a7a}
.meta span{color:#90a0c0}
.controls{display:flex;gap:12px}
.btn{padding:6px 16px;border:1px solid rgba(48,96,255,0.2);border-radius:4px;background:rgba(48,96,255,0.06);color:#4060a0;font-size:9px;letter-spacing:1px;cursor:pointer;transition:.3s}
.btn:hover{border-color:#4060a0;color:#80b0ff}
.btn.active{border-color:#20c060;color:#20c060;background:rgba(0,200,100,0.06)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
a{color:#4060a0;text-decoration:none;font-size:10px;position:absolute;top:20px;right:20px}
</style>
</head><body>
<a href="https://constellation.vaked.dev">← constellation</a>
<div class="header"><h1>Vaked-FM</h1><div class="title">PULSE</div><div class="sub">24/7 ambient soundscape · heartbeat of the truth engine · <span id="status-text" style="color:#20b0ff">INITIALIZING</span></div></div>

<div style="display:flex;gap:48px;margin-top:16px;font-size:10px;color:#5a5a7a">
<div style="text-align:center"><span style="color:#e0e8f0" id="time-display">--:--:--</span><br>UTC</div>
<div style="text-align:center"><span style="color:#e0e8f0" id="nodes-display2">5</span><br>NODES</div>
<div style="text-align:center"><span style="color:#e0e8f0" id="conv-display">27</span><br>MS CONV</div>
<div style="text-align:center"><span style="color:#5a5a7a;font-family:monospace;font-size:9px" id="genesis-display">7c242080</span><br>SEAL</div>
</div>
<canvas id="scope"></canvas>
<div class="bar"><div class="bar-fill" id="health-bar" style="width:100%"></div></div>
<div class="meta"><span id="bpm-display">60 BPM</span> · seal <span id="seal-status">holds</span> · trust <span id="trust-display">1.000</span> · nodes <span id="nodes-display">5</span></div>
<div id="start-prompt" style="padding:12px 24px;border:1px solid rgba(48,96,255,0.3);border-radius:6px;background:rgba(48,96,255,0.08);color:#80b0ff;font-size:11px;letter-spacing:1px;cursor:pointer;text-align:center;animation:pulse 2s infinite" onclick="startAudio()">
⬡ CLICK ANYWHERE TO START AUDIO
</div>
<div class="controls" style="display:none" id="controls-row">
<button class="btn active" id="audio-toggle" onclick="toggleAudio()">◉ STREAMING</button>
<button class="btn" onclick="window.open('https://constellation.vaked.dev/mesh.json')">◇ JSON</button>
</div>

<script>
// ── Web Audio Engine ──────────────────────────────────────────────────
let audioCtx=null,subBass=null,harmonic=null,gainNode=null,filterNode=null;
let bpm=60,trust=1.0,sealHolds=true,nextBeat=0;
let chimeTimer=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new AudioContext();
  
  // Sub-bass heartbeat (sine, 41.2Hz = E1)
  subBass=audioCtx.createOscillator();subBass.type='sine';subBass.frequency.value=41.2;
  gainNode=audioCtx.createGain();gainNode.gain.value=0;
  filterNode=audioCtx.createBiquadFilter();filterNode.type='lowpass';filterNode.frequency.value=200;filterNode.Q.value=1;
  subBass.connect(filterNode);filterNode.connect(gainNode);gainNode.connect(audioCtx.destination);
  subBass.start();
  
  // Harmonic chime (sine, 220Hz = A3 — Genesis Seal)
  harmonic=audioCtx.createOscillator();harmonic.type='sine';harmonic.frequency.value=220;
  let harmonicGain=audioCtx.createGain();harmonicGain.gain.value=0;
  harmonic.connect(harmonicGain);harmonicGain.connect(audioCtx.destination);
  harmonic.start();
  
  // ── Lo-fi texture layer ─────────────────────────────────────────────
  // Brown noise → heavy lowpass → subtle warmth under everything
  
  // Brown noise (filtered white noise, deeper than pink)
  let bufferSize=audioCtx.sampleRate*2,noiseBuffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
  let data=noiseBuffer.getChannelData(0);let lastOut=0;
  for(let i=0;i<bufferSize;i++){let white=Math.random()*2-1;data[i]=(lastOut+(0.02*white))/1.02;lastOut=data[i];}
  let noiseSource=audioCtx.createBufferSource();noiseSource.buffer=noiseBuffer;noiseSource.loop=true;
  let noiseFilter=audioCtx.createBiquadFilter();noiseFilter.type='lowpass';noiseFilter.frequency.value=80;
  let noiseGain=audioCtx.createGain();noiseGain.gain.value=0.04;
  noiseSource.connect(noiseFilter);noiseFilter.connect(noiseGain);noiseGain.connect(audioCtx.destination);
  noiseSource.start();
  
  // Warm pad — slow triangle wave, filtered, detuned slightly
  let pad=audioCtx.createOscillator();pad.type='triangle';pad.frequency.value=65.4; // C2
  let padDetune=audioCtx.createOscillator();padDetune.type='sine';padDetune.frequency.value=0.08;
  let padDetuneGain=audioCtx.createGain();padDetuneGain.gain.value=2;
  padDetune.connect(padDetuneGain);padDetuneGain.connect(pad.frequency);
  padDetune.start();
  let padFilter=audioCtx.createBiquadFilter();padFilter.type='lowpass';padFilter.frequency.value=300;padFilter.Q.value=0.5;
  let padGain=audioCtx.createGain();padGain.gain.value=0.06;
  pad.connect(padFilter);padFilter.connect(padGain);padGain.connect(audioCtx.destination);
  pad.start();
  
  // Slow AM modulation on the pad
  let padMod=audioCtx.createOscillator();padMod.type='sine';padMod.frequency.value=0.15;
  let padModGain=audioCtx.createGain();padModGain.gain.value=0.03;
  padMod.connect(padModGain);padModGain.connect(padGain.gain);
  padMod.start();
  
  // ── Chime every few seconds (capability-graph update) ────────────────
  chimeTimer=setInterval(()=>{
    harmonicGain.gain.setTargetAtTime(0.08,audioCtx.currentTime,0.01);
    harmonicGain.gain.setTargetAtTime(0,audioCtx.currentTime+0.3,0.05);
  },5000);
}

function heartbeatPulse(){
  if(!audioCtx||!gainNode)return;
  const now=audioCtx.currentTime;
  const beatInterval=60/bpm;
  if(now>=nextBeat){
    // Sub-bass thump
    gainNode.gain.setTargetAtTime(0.6,now,0.005);
    gainNode.gain.setTargetAtTime(0,now+beatInterval*0.15,beatInterval*0.3);
    nextBeat=now+beatInterval;
  }
}

function updateTelemetry(d){
  bpm=d.status==='divergence'?90:d.drift_detected?140:60+Math.min(d.convergence_ms||0,500)/10;
  trust=d.trust_index||1;
  sealHolds=!d.drift_detected;
  
  // Filter resonance shifts with drift
  if(filterNode){
    filterNode.frequency.setTargetAtTime(200+(d.convergence_ms||0)*2,audioCtx.currentTime,0.5);
    filterNode.Q.setTargetAtTime(sealHolds?1:8,audioCtx.currentTime,0.5);
  }
  if(sealHolds){
    document.getElementById('seal-status').style.color='#20c060';
  }else{
    document.getElementById('seal-status').style.color='#ff4242';
  }
}

// ── Oscilloscope ──────────────────────────────────────────────────────
const canvas=document.getElementById('scope');
const ctx=canvas.getContext('2d');canvas.width=600;canvas.height=100;
let phase=0;
function drawScope(){
  ctx.fillStyle='#08081a';ctx.fillRect(0,0,canvas.width,canvas.height);
  const beatPhase=(phase%Math.floor(60000/bpm))/(60000/bpm);
  const beat=Math.sin(beatPhase*Math.PI);
  const amp=Math.abs(beat);
  const center=canvas.height/2;
  
  // Waveform
  ctx.strokeStyle='rgba(48,96,255,'+(0.15+amp*0.3)+')';ctx.lineWidth=2+amp;
  ctx.beginPath();ctx.moveTo(0,center);
  for(let x=0;x<canvas.width;x+=2){
    ctx.lineTo(x,center+Math.sin((x+phase)*0.03)*amp*40);
  }
  ctx.stroke();
  
  // Sub-bass trace
  ctx.strokeStyle='rgba(32,64,128,0.1)';ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<canvas.width;x+=4){
    ctx.lineTo(x,center+Math.sin((x-phase)*0.08)*15);
  }
  ctx.stroke();
  phase+=2;requestAnimationFrame(drawScope);
}

// ── Telemetry fetch ────────────────────────────────────────────────────
async function fetchTelemetry(){
  try{
    const r=await fetch('mesh.json');
    if(!r.ok)return;
    const d=await r.json();
    document.getElementById('status-text').textContent=d.status||'synced';
    document.getElementById('bpm-display').textContent=Math.round(bpm)+' BPM';
    document.getElementById('trust-display').textContent=trust.toFixed(3);
    document.getElementById('nodes-display').textContent=d.nodes||5;
    document.getElementById('nodes-display2').textContent=d.nodes||5;
    document.getElementById('conv-display').textContent=Math.round(d.convergence_ms||27);
    document.getElementById('genesis-display').textContent='7c242080';
    document.getElementById('health-bar').style.width=(trust*100)+'%';
    updateTelemetry(d);
  }catch(e){}
}
// ── Clock ──────────────────────────────────────────────────────────────
function updateClock(){
  const d=new Date();
  document.getElementById('time-display').textContent=
    d.getUTCHours().toString().padStart(2,'0')+':'+
    d.getUTCMinutes().toString().padStart(2,'0')+':'+
    d.getUTCSeconds().toString().padStart(2,'0');
}
setInterval(updateClock,1000);updateClock();

// ── Audio toggle ────────────────────────────────────────────────────────
function toggleAudio(){
  const btn=document.getElementById('audio-toggle');
  if(!audioCtx){initAudio();btn.classList.add('active');btn.textContent='◉ STREAMING';return;}
  if(audioCtx.state==='running'){audioCtx.suspend();btn.classList.remove('active');btn.textContent='○ PAUSED';}
  else{audioCtx.resume();btn.classList.add('active');btn.textContent='◉ STREAMING';}
}

// ── Main loop ───────────────────────────────────────────────────────────
fetchTelemetry();setInterval(fetchTelemetry,5000);
drawScope();
setInterval(()=>{if(audioCtx&&audioCtx.state==='running')heartbeatPulse();},50);

// Auto-start with user gesture prompt
function startAudio(){
  if(!audioCtx)initAudio();
  if(audioCtx.state==='suspended')audioCtx.resume();
  document.getElementById('audio-toggle').classList.add('active');
  document.getElementById('audio-toggle').textContent='◉ STREAMING';
  document.getElementById('start-prompt').style.display='none';
  document.getElementById('controls-row').style.display='flex';
}
document.body.addEventListener('click',()=>{if(!audioCtx||audioCtx.state==='suspended')startAudio();});

// Try to auto-start when user interacts
document.addEventListener('keydown',startAudio,{once:true});
document.addEventListener('touchstart',startAudio,{once:true});
</script>
</body>
</html>
