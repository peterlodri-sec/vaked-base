```svg
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <style>
    .valid { fill: green; font-size: 14px; font-weight: bold; }
    .invalid { fill: red; font-size: 14px; font-weight: bold; }
    .text { font-size: 12px; }
    .box { fill: #f0f0f0; stroke: #000; stroke-width: 1; }
  </style>

  <!-- Canonical Path -->
  <rect x="50" y="50" width="700" height="50" class="box"/>
  <text x="100" y="80" class="text">Canonical Path: Minimal Varints → Tag-Ordered Fields → Default-Omitted → NFC Strings → Valid Encoding</text>
  <text x="600" y="80" class="valid">✔</text>
  <text x="650" y="80" class="text">Example: 0x01 0x02 0x03</text>

  <!-- Non-Canonical Traps -->
  <rect x="50" y="150" width="700" height="50" class="box"/>
  <text x="100" y="180" class="text">Non-Canonical Traps: Overlong Varints, Out-of-Order Tags, Non-Omitted Defaults, Non-NFC Strings</text>
  <text x="600" y="180" class="invalid">✖</text>
  <text x="650" y="180" class="text">Example: 0x80 0x01, 0x03 0x02, 0xFF</text>

  <!-- Frame-Level Error -->
  <rect x="50" y="250" width="700" height="50" class="box"/>
  <text x="100" y="280" class="text">Frame-Level Error → Not Chained to Eventd</text>
  <text x="600" y="280" class="invalid">✖</text>
  <text x="650" y="280" class="text">Example: 0xFF 0xFE</text>

  <!-- Arrows -->
  <line x1="400" y1="100" x2="400" y2="150" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="200" x2="400" y2="250" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow Marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>
```
