<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="400" fill="#f0f0f0"/>
  
  <text x="20" y="30" font-family="Arial" font-size="16" fill="#333">Control-Plane Epoch Skew and Resolution</text>
  
  <line x1="100" y1="100" x2="700" y2="100" stroke="#ccc" stroke-width="2"/>
  <line x1="100" y1="200" x2="700" y2="200" stroke="#ccc" stroke-width="2"/>
  
  <text x="50" y="100" font-family="Arial" font-size="14" fill="#333">Epoch 1</text>
  <text x="50" y="200" font-family="Arial" font-size="14" fill="#333">Epoch 2</text>
  
  <rect x="100" y="80" width="100" height="40" fill="#ffcccb"/>
  <text x="130" y="105" font-family="Arial" font-size="14" fill="#333">Agent A</text>
  
  <rect x="300" y="180" width="100" height="40" fill="#add8e6"/>
  <text x="330" y="205" font-family="Arial" font-size="14" fill="#333">Agent B</text>
  
  <line x1="200" y1="100" x2="300" y2="200" stroke="#ff6347" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="220" y="130" font-family="Arial" font-size="12" fill="#333">Control Request (Stale)</text>
  
  <line x1="400" y1="100" x2="400" y2="200" stroke="#32cd32" stroke-width="2"/>
  <text x="420" y="130" font-family="Arial" font-size="12" fill="#333">Control Request (Success)</text>
  
  <rect x="600" y="80" width="100" height="40" fill="#ffcccb"/>
  <text x="630" y="105" font-family="Arial" font-size="14" fill="#333">Epoch Bump</text>
  
  <line x1="600" y1="100" x2="600" y2="200" stroke="#ff6347" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="610" y="130" font-family="Arial" font-size="12" fill="#333">Supervisor Assigns</text>
  
  <text x="20" y="350" font-family="Arial" font-size="12" fill="#333">Result: ControlRefusal::StaleEpoch</text>
  <text x="20" y="370" font-family="Arial" font-size="12" fill="#333">Result: Control Succeeds</text>
</svg>
