<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="50" width="800" height="300" fill="white" stroke="black" />
  <line x1="0" y1="150" x2="800" y2="150" stroke="black" stroke-width="2" />
  <text x="10" y="40" font-family="Arial" font-size="14">Timeline</text>
  
  <text x="10" y="70" font-family="Arial" font-size="12">T0: Producer emits step 100</text>
  <rect x="100" y="70" width="50" height="20" fill="green" />
  <text x="110" y="85" font-family="Arial" font-size="12">100</text>
  
  <text x="10" y="100" font-family="Arial" font-size="12">T1: Consumer checkpoints at step 100</text>
  <line x1="100" y1="100" x2="100" y2="150" stroke="black" stroke-width="2" />
  <text x="80" y="130" font-family="Arial" font-size="12" fill="black">Checkpoint</text>
  
  <text x="10" y="130" font-family="Arial" font-size="12">T2: More steps 101-200 produced/consumed</text>
  <rect x="150" y="130" width="650" height="20" fill="green" />
  <text x="160" y="145" font-family="Arial" font-size="12">101-200</text>
  
  <text x="10" y="160" font-family="Arial" font-size="12">T3: GC floor=100 (checkpoint pins)</text>
  <line x1="0" y1="160" x2="800" y2="160" stroke="red" stroke-width="2" stroke-dasharray="5,5" />
  <text x="10" y="180" font-family="Arial" font-size="12" fill="red">GC Floor</text>
  
  <text x="10" y="200" font-family="Arial" font-size="12">T4: Rewind event to step 150</text>
  <line x1="150" y1="200" x2="150" y2="250" stroke="black" stroke-width="2" marker-end="url(#arrow)" />
  <text x="130" y="230" font-family="Arial" font-size="12" fill="black">Rewind</text>
  
  <text x="10" y="230" font-family="Arial" font-size="12">T5: Affected agents re-verify cold-start from checkpoint</text>
  <rect x="100" y="230" width="50" height="20" fill="yellow" />
  <text x="110" y="245" font-family="Arial" font-size="12">100</text>
  
  <text x="10" y="260" font-family="Arial" font-size="12">T6: New consumers can start from checkpoint</text>
  <rect x="150" y="260" width="650" height="20" fill="green" />
  <text x="160" y="275" font-family="Arial" font-size="12">100</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>
</svg>
