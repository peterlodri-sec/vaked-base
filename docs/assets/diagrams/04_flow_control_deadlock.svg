<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>
  <rect x="10" y="10" width="150" height="580" fill="#f0f0f0" stroke="#000" />
  <rect x="170" y="10" width="150" height="580" fill="#f0f0f0" stroke="#000" />
  <rect x="330" y="10" width="150" height="580" fill="#f0f0f0" stroke="#000" />
  <rect x="490" y="10" width="150" height="580" fill="#f0f0f0" stroke="#000" />
  
  <text x="50" y="30" font-family="Arial" font-size="14">Client</text>
  <text x="210" y="30" font-family="Arial" font-size="14">Backpressure Queue</text>
  <text x="370" y="30" font-family="Arial" font-size="14">Control Queue</text>
  <text x="530" y="30" font-family="Arial" font-size="14">Server</text>
  
  <line x1="85" y1="50" x2="85" y2="550" stroke="#000" stroke-dasharray="5,5" />
  <line x1="245" y1="50" x2="245" y2="550" stroke="#000" stroke-dasharray="5,5" />
  <line x1="405" y1="50" x2="405" y2="550" stroke="#000" stroke-dasharray="5,5" />
  <line x1="565" y1="50" x2="565" y2="550" stroke="#000" stroke-dasharray="5,5" />
  
  <text x="10" y="70" font-family="Arial" font-size="12">1. Client sends request frame</text>
  <text x="210" y="70" font-family="Arial" font-size="12">2. Server receives, starts processing</text>
  <text x="10" y="130" font-family="Arial" font-size="12">3. Client sends more frames</text>
  <text x="210" y="130" font-family="Arial" font-size="12">Credit exhausted, client stalls</text>
  <text x="10" y="190" font-family="Arial" font-size="12">4. Server needs to send control frame</text>
  <text x="210" y="190" font-family="Arial" font-size="12">Control frames bypass backpressure</text>
  <text x="10" y="250" font-family="Arial" font-size="12">5. Ping delivered immediately</text>
  <text x="210" y="250" font-family="Arial" font-size="12">Pong sent, liveness verified</text>
  <text x="10" y="310" font-family="Arial" font-size="12">6. Data flow resumes</text>
  
  <line x1="85" y1="90" x2="245" y2="90" stroke="#000" marker-end="url(#arrow)" />
  <line x1="245" y1="90" x2="405" y2="90" stroke="#000" marker-end="url(#arrow)" />
  <line x1="85" y1="150" x2="245" y2="150" stroke="#000" marker-end="url(#arrow)" />
  <line x1="245" y1="150" x2="405" y2="150" stroke="#000" marker-end="url(#arrow)" />
  <line x1="85" y1="210" x2="245" y2="210" stroke="#000" marker-end="url(#arrow)" />
  <line x1="245" y1="210" x2="405" y2="210" stroke="#000" marker-end="url(#arrow)" />
  <line x1="85" y1="270" x2="245" y2="270" stroke="#000" marker-end="url(#arrow)" />
  <line x1="245" y1="270" x2="405" y2="270" stroke="#000" marker-end="url(#arrow)" />
  
  <line x1="85" y1="130" x2="85" y2="170" stroke="#000" stroke-dasharray="5,5" />
  <line x1="245" y1="130" x2="245" y2="170" stroke="#000" stroke-dasharray="5,5" />
  
  <line x1="405" y1="210" x2="405" y2="250" stroke="#000" stroke-dasharray="5,5" />
  <line x1="405" y1="250" x2="565" y2="250" stroke="#000" marker-end="url(#arrow)" />
</svg>
