<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Write-Ahead -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="200" height="100" fill="lightblue" stroke="black"/>
    <text x="10" y="20" font-family="Arial" font-size="16">DependencyRegistration</text>
    <rect x="0" y="120" width="200" height="100" fill="lightgreen" stroke="black"/>
    <text x="10" y="140" font-family="Arial" font-size="16">Event Log</text>
    <line x1="200" y1="50" x2="200" y2="170" stroke="black" stroke-width="2"/>
    <polygon points="210,150 230,170 230,130" fill="green"/>
    <text x="240" y="160" font-family="Arial" font-size="16">✓</text>
  </g>

  <!-- Checkpointing -->
  <g transform="translate(300, 50)">
    <line x1="0" y1="50" x2="400" y2="50" stroke="black" stroke-width="2"/>
    <line x1="0" y1="50" x2="0" y2="300" stroke="black" stroke-width="2"/>
    <line x1="400" y1="50" x2="400" y2="300" stroke="black" stroke-width="2"/>
    <rect x="0" y="100" width="400" height="200" fill="lightyellow" stroke="black"/>
    <text x="10" y="90" font-family="Arial" font-size="16">Checkpointing</text>
    <line x1="0" y1="150" x2="400" y2="150" stroke="red" stroke-width="2" stroke-dasharray="5,5"/>
    <polygon points="350,50 370,70 370,30" fill="yellow"/>
    <text x="380" y="60" font-family="Arial" font-size="16">Compaction</text>
  </g>

  <!-- Rewind Cascades -->
  <g transform="translate(50, 400)">
    <line x1="0" y1="50" x2="400" y2="50" stroke="black" stroke-width="2"/>
    <line x1="0" y1="50" x2="0" y2="300" stroke="black" stroke-width="2"/>
    <line x1="400" y1="50" x2="400" y2="300" stroke="black" stroke-width="2"/>
    <text x="10" y="30" font-family="Arial" font-size="16">Rewind Cascades</text>
    <circle cx="200" cy="50" r="30" fill="yellow" />
    <line x1="200" y1="50" x2="200" y2="300" stroke="red" stroke-width="2" />
    <text x="210" y="50" font-family="Arial" font-size="16">Target Step</text>
    <circle cx="150" cy="50" r="5" fill="red" />
    <circle cx="250" cy="50" r="5" fill="red" />
    <circle cx="100" cy="50" r="5" fill="red" />
    <circle cx="300" cy="50" r="5" fill="red" />
    <text x="10" y="100" font-family="Arial" font-size="16">Affected Anchors</text>
  </g>
</svg>
