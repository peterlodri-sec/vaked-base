<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect x="50" y="150" width="100" height="50" fill="blue" />
  <text x="100" y="180" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Host A</text>
  <text x="100" y="200" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Producer</text>
  
  <rect x="650" y="150" width="100" height="50" fill="blue" />
  <text x="700" y="180" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Host B</text>
  <text x="700" y="200" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Consumer</text>
  
  <rect x="350" y="150" width="100" height="50" fill="orange" />
  <text x="400" y="180" font-family="Arial" font-size="14" fill="white" text-anchor="middle">NATS Broker</text>
  
  <line x1="150" y1="175" x2="350" y2="175" stroke="black" stroke-width="2" marker-end="url(#arrow)" />
  <text x="250" y="160" font-family="Arial" font-size="12" fill="black" text-anchor="middle">Publish RewindEvent</text>
  
  <line x1="450" y1="175" x2="650" y2="175" stroke="black" stroke-width="2" marker-end="url(#arrow)" />
  <text x="550" y="160" font-family="Arial" font-size="12" fill="black" text-anchor="middle">Subscribe to agent.<uuid>.rewind</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>
</svg>
