<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f0f0f0"/>
  
  <!-- Transport/TLS Layer -->
  <rect x="50" y="450" width="700" height="100" fill="#e0e0e0" stroke="#000" stroke-width="2"/>
  <text x="400" y="490" font-size="20" text-anchor="middle" fill="#000">Transport/TLS</text>
  <text x="100" y="490" font-size="20" text-anchor="middle" fill="#000">🔒</text>
  <text x="700" y="490" font-size="20" text-anchor="middle" fill="#000">🔒</text>
  
  <!-- SPIFFE Layer -->
  <rect x="50" y="325" width="700" height="125" fill="#d0e0f0" stroke="#000" stroke-width="2"/>
  <text x="400" y="365" font-size="20" text-anchor="middle" fill="#000">SPIFFE Identity Extraction</text>
  <text x="100" y="365" font-size="20" text-anchor="middle" fill="#000">🛡️</text>
  <text x="700" y="365" font-size="20" text-anchor="middle" fill="#000">🛡️</text>
  
  <!-- HCP Layer -->
  <rect x="50" y="200" width="700" height="125" fill="#f0d0d0" stroke="#000" stroke-width="2"/>
  <text x="400" y="240" font-size="20" text-anchor="middle" fill="#000">HCP Handshake</text>
  <text x="100" y="240" font-size="20" text-anchor="middle" fill="#000">📄</text>
  <text x="700" y="240" font-size="20" text-anchor="middle" fill="#000">📄</text>
  
  <!-- Host A -->
  <rect x="50" y="50" width="300" height="100" fill="#c0f0c0" stroke="#000" stroke-width="2"/>
  <text x="200" y="100" font-size="20" text-anchor="middle" fill="#000">Host A</text>
  
  <!-- Host B -->
  <rect x="450" y="50" width="300" height="100" fill="#c0f0c0" stroke="#000" stroke-width="2"/>
  <text x="600" y="100" font-size="20" text-anchor="middle" fill="#000">Host B</text>
  
  <!-- NATS pub/sub -->
  <rect x="50" y="550" width="700" height="30" fill="#ffd700" stroke="#000" stroke-width="2"/>
  <text x="400" y="570" font-size="16" text-anchor="middle" fill="#000">NATS Pub/Sub for Cross-Host Notifications</text>
  
  <!-- Arrows -->
  <line x1="350" y1="150" x2="450" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="150" x2="450" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>
</svg>
