<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <style>
    .control { fill: lightblue; }
    .state { fill: lightgreen; }
    .utility { fill: lightgray; }
    .box { stroke: black; stroke-width: 2; }
    .label { font-family: Arial, sans-serif; font-size: 12px; }
    .arrow { fill: none; stroke: black; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <g transform="translate(50, 50)">
    <g>
      <rect class="control box" x="0" y="0" width="200" height="80"/>
      <text class="label" x="10" y="20">chapterd</text>
      <text class="label" x="10" y="40">Chapter Lifecycle</text>
      
      <rect class="control box" x="250" y="0" width="200" height="80"/>
      <text class="label" x="260" y="20">petitiond</text>
      <text class="label" x="260" y="40">Request Intake</text>
      
      <rect class="control box" x="500" y="0" width="200" height="80"/>
      <text class="label" x="510" y="20">mcp-brokerd</text>
      <text class="label" x="510" y="40">MCP Edge</text>
    </g>

    <g transform="translate(0, 100)">
      <rect class="control box" x="0" y="0" width="200" height="80"/>
      <text class="label" x="10" y="20">preceptord</text>
      <text class="label" x="10" y="40">Authority/Policy</text>
      
      <rect class="control box" x="250" y="0" width="200" height="80"/>
      <text class="label" x="260" y="20">oraclefd</text>
      <text class="label" x="260" y="40">Resolution</text>
      
      <rect class="control box" x="500" y="0" width="200" height="80"/>
      <text class="label" x="510" y="20">candled</text>
      <text class="label" x="510" y="40">Liveness</text>
    </g>

    <g transform="translate(0, 200)">
      <rect class="utility box" x="0" y="0" width="200" height="80"/>
      <text class="label" x="10" y="20">reliquaryd</text>
      <text class="label" x="10" y="40">Artifact Store</text>
      
      <rect class="utility box" x="250" y="0" width="200" height="80"/>
      <text class="label" x="260" y="20">agent-supervisord</text>
      <text class="label" x="260" y="40">OTP Supervision</text>
      
      <rect class="utility box" x="500" y="0" width="200" height="80"/>
      <text class="label" x="510" y="20">eventd</text>
      <text class="label" x="510" y="40">Append-Only Log</text>
    </g>
  </g>

  <g>
    <line class="arrow" x1="100" y1="80" x2="100" y2="100"/>
    <line class="arrow" x1="350" y1="80" x2="350" y2="100"/>
    <line class="arrow" x1="600" y1="80" x2="600" y2="100"/>

    <line class="arrow" x1="100" y1="180" x2="100" y2="200"/>
    <line class="arrow" x1="350" y1="180" x2="350" y2="200"/>
    <line class="arrow" x1="600" y1="180" x2="600" y2="200"/>

    <line class="arrow" x1="100" y1="280" x2="100" y2="300"/>
    <line class="arrow" x1="350" y1="280" x2="350" y2="300"/>
    <line class="arrow" x1="600" y1="280" x2="600" y2="300"/>
  </g>
</svg>
