<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect x="300" y="50" width="200" height="50" fill="#f0f0f0" stroke="#000" />
  <text x="350" y="80" font-family="Arial" font-size="16" fill="#000">ControlRefusal</text>

  <line x1="400" y1="100" x2="400" y2="150" stroke="#000" />
  <line x1="400" y1="150" x2="200" y2="200" stroke="#000" />
  <line x1="400" y1="150" x2="600" y2="200" stroke="#000" />
  <line x1="400" y1="150" x2="200" y2="300" stroke="#000" />
  <line x1="400" y1="150" x2="600" y2="300" stroke="#000" />
  <line x1="400" y1="150" x2="400" y2="400" stroke="#000" />

  <rect x="150" y="180" width="100" height="50" fill="#f0f0f0" stroke="#000" />
  <text x="160" y="210" font-family="Arial" font-size="14" fill="#000">NotFound</text>
  <text x="160" y="230" font-family="Arial" font-size="12" fill="#000">? Target agent not found</text>
  <text x="160" y="250" font-family="Arial" font-size="12" fill="#000">Response: 404</text>

  <rect x="550" y="180" width="100" height="50" fill="#f0f0f0" stroke="#000" />
  <text x="570" y="210" font-family="Arial" font-size="14" fill="#000">PermissionDenied</text>
  <text x="570" y="230" font-family="Arial" font-size="12" fill="#000">🔒 Policy rejection</text>
  <text x="570" y="250" font-family="Arial" font-size="12" fill="#000">Response: 403</text>

  <rect x="150" y="280" width="100" height="50" fill="#f0f0f0" stroke="#000" />
  <text x="160" y="310" font-family="Arial" font-size="14" fill="#000">StaleEpoch</text>
  <text x="160" y="330" font-family="Arial" font-size="12" fill="#000">🕰️ Topology mismatch</text>
  <text x="160" y="350" font-family="Arial" font-size="12" fill="#000">Response: 409</text>

  <rect x="550" y="280" width="100" height="50" fill="#f0f0f0" stroke="#000" />
  <text x="570" y="310" font-family="Arial" font-size="14" fill="#000">Unavailable</text>
  <text x="570" y="330" font-family="Arial" font-size="12" fill="#000">⏸️ Target paused</text>
  <text x="570" y="350" font-family="Arial" font-size="12" fill="#000">Response: 503</text>

  <rect x="150" y="380" width="100" height="50" fill="#f0f0f0" stroke="#000" />
  <text x="160" y="410" font-family="Arial" font-size="14" fill="#000">InvalidArgument</text>
  <text x="160" y="430" font-family="Arial" font-size="12" fill="#000">✏️ Malformed request</text>
  <text x="160" y="450" font-family="Arial" font-size="12" fill="#000">Response: 400</text>

  <rect x="550" y="380" width="100" height="50" fill="#f0f0f0" stroke="#000" />
  <text x="570" y="410" font-family="Arial" font-size="14" fill="#000">Internal</text>
  <text x="570" y="430" font-family="Arial" font-size="12" fill="#000">⚠️ Unexpected error</text>
  <text x="570" y="450" font-family="Arial" font-size="12" fill="#000">Response: 500</text>
</svg>
