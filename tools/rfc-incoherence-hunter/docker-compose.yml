services:
  control-plane:
    image: agentfield/control-plane:latest
    environment:
      AGENTFIELD_STORAGE_MODE: local
      AGENTFIELD_HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "${AGENTFIELD_HTTP_PORT:-8080}:8080"
    volumes:
      - agentfield-data:/data
  rfc-incoherence-hunter:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      AGENTFIELD_SERVER: http://control-plane:8080
      AGENT_CALLBACK_URL: http://rfc-incoherence-hunter:8001
      AGENT_NODE_ID: ${AGENT_NODE_ID:-rfc-incoherence-hunter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-openrouter/google/gemini-2.5-flash}
      PORT: ${PORT:-8001}
      RFC_DIR: /rfcs/protocol/rfcs
      RFC_DIR_ROOT: /rfcs
    ports:
      - "${AGENT_NODE_PORT:-8001}:8001"
    volumes:
      - ${VAKED_REPO_PATH:-/Users/lodripeter/workspace/peterlodri-sec/vaked-base}:/rfcs:ro
    depends_on:
      control-plane:
        condition: service_started
    restart: on-failure

volumes:
  agentfield-data:
