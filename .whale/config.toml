# Whale project config — vaked-base (shared)
# OpenRouter via DEEPSEEK_API_KEY + custom base_url
model = "deepseek/deepseek-chat"

[api]
base_url = "https://openrouter.ai/api/v1"

[permissions]
default = "ask"

[permissions.web_search]
"*" = "allow"

[permissions.web_fetch]
"*" = "allow"

[permissions.mcp]
vaked_docs = "allow"
vaked_rag = "allow"
vaked_memory = "allow"
vaked_fleet = "allow"

[shell]
foreground_wait_default_ms = 15000
foreground_wait_max_ms = 120000

[workflows]
enabled = false
keyword_trigger_enabled = false

[skills]
# Built-in skills auto-discovered; disable unused ones here
disabled = []

[plugins.memory]
enabled = true

[logging]
level = "info"
