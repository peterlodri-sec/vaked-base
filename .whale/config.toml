# Whale Ultra — DeepSeek-native optimized config
model = "deepseek-v4-flash"

# Reasoning: "high" = deep thought for complex tasks, "minimal" = fast for simple
reasoning_effort = "high"
thinking_enabled = true

[permissions]
default = "ask"

[permissions.web_search]
"*" = "allow"

[permissions.web_fetch]
"*" = "allow"

[permissions.mcp]
vaked_docs = "allow"
vaked_rag = "allow"
vaked_memory = "allow"
vaked_fleet = "allow"
nix = "allow"

[shell]
foreground_wait_default_ms = 15000
foreground_wait_max_ms = 120000

[experimental]
# DeepSeek prefix completion — caches prompt prefix for 98% hit rate
deepseek_prefix_completion = true

[logging]
level = "info"

[workflows]
enabled = true
keyword_trigger_enabled = true
max_concurrency = 8
