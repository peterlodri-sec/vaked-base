<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Vaked Memory Plane</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#08081a;color:#c8d0e0;font-family:'SF Mono',monospace;padding:20px}h1{font-size:11px;color:#8060c0;letter-spacing:3px;margin-bottom:20px}.card{background:#0d0d24;border:1px solid rgba(128,96,192,0.15);border-radius:6px;padding:16px;margin-bottom:12px}.card h2{font-size:12px;color:#90a0d0;margin-bottom:8px}.status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px}.running{background:#f0c040}.done{background:#40c060}.failed{background:#c04040}.idle{background:#404060}.row{display:flex;gap:20px;flex-wrap:wrap}.col{flex:1;min-width:300px}.metric{font-size:24px;color:#e0e8f0;font-weight:300}.label{font-size:9px;color:#5a5a7a;text-transform:uppercase;letter-spacing:2px}.breadcrumb{font-size:10px;color:#6090c0;padding:8px 0}.pill{display:inline-block;background:rgba(128,96,192,0.15);padding:2px 8px;border-radius:10px;font-size:9px;margin:2px}</style></head>
<body><h1>MEMORY PLANE · 7c242080</h1>
<div class="row"><div class="col"><div class="card"><h2>Live Telemetry</h2><div class="row"><div><div class="metric" id="budget">$--</div><div class="label">Budget</div></div><div><div class="metric" id="tokens">--</div><div class="label">Tokens</div></div><div><div class="metric" id="active">--</div><div class="label">Active</div></div></div></div></div><div class="col"><div class="card"><h2>Subagents [H:<span id="h-count">0</span> V:<span id="v-count">0</span> S:<span id="s-count">0</span>]</h2><div id="subagent-list"></div></div></div></div>
<div class="card"><h2>Recursion Stack</h2><div class="breadcrumb" id="breadcrumb">No active recursion</div></div>
<div class="card"><h2>Memory Store</h2><div id="memories">Loading...</div></div>
<script>const A='http://localhost:9090',M='http://localhost:8420';async function refresh(){try{const h=await fetch(A+'/health').then(r=>r.json());document.getElementById('budget').textContent='$'+(h.budget||'--');document.getElementById('tokens').textContent=(h.tokens||'--');document.getElementById('active').textContent=(h.active||'0')}catch(e){}try{const r=await fetch(M+'/recall',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({capability:{agent_id:'vaked-agent',level:'admin'}})}).then(r=>r.json());const m=document.getElementById('memories');if(r.entries?.length)m.innerHTML=r.entries.map(e=>'<div class="pill">'+e.key+': '+e.content.slice(0,80)+'</div>').join('');else m.textContent='No memories.'}catch(e){document.getElementById('memories').textContent='Memory daemon offline.'}}refresh();setInterval(refresh,2000);</script></body></html>
