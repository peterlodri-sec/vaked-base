# Taskfile for vaked-base — https://taskfile.dev  (state-of-the-art task runner:
# YAML, cross-platform, dependency graph, built-in parallelism via `deps`).
#
# Every task runs inside the flake devshell (`nix develop`), so the toolchains
# (python3 for vakedc, zig, beam) are PRELOADED and binary-CACHED (attic
# substituter) — first `task warm` builds/fetches the shell once, then every
# subsequent task enters it from cache (fast). Set HOST=<name> to select a
# per-host devshell if the flake exposes one; default is the flake's devShell.
version: '3'

vars:
  DEVSHELL: '{{if .HOST}}.#{{.HOST}}{{end}}'
  RUN: nix develop {{.DEVSHELL}} --command

tasks:
  default:
    cmds: [task --list]
    silent: true

  warm:
    desc: Build + cache the devshell once (preload; later tasks enter it instantly).
    cmds:
      - nix develop {{.DEVSHELL}} --command true

  parse:
    desc: 'Parse a .vaked file → LPG.  Usage: task parse -- path/to/file.vaked'
    cmds: ['{{.RUN}} bash tools/vaked-run.sh parse {{.CLI_ARGS}}']

  check:
    desc: 'Type-check a .vaked file (0011).  Usage: task check -- file.vaked'
    cmds: ['{{.RUN}} bash tools/vaked-run.sh check {{.CLI_ARGS}}']

  lower:
    desc: 'Lower a .vaked file → artifacts (0012).  Usage: task lower -- file.vaked [out]'
    cmds: ['{{.RUN}} bash tools/vaked-run.sh lower {{.CLI_ARGS}}']

  all:
    desc: 'parse → check → lower, BuildKit-style.  Usage: task all -- file.vaked [out]'
    cmds: ['{{.RUN}} bash tools/vaked-run.sh all {{.CLI_ARGS}}']

  deploy:
    desc: 'Lower then colmena apply the declared hosts (#51).  Usage: task deploy -- file.vaked  (aspirational: needs nixosModules.<runtime> materialized — interface-only in the spine today)'
    cmds:
      - |
        {{.RUN}} bash -c '
          set -euo pipefail
          src="${1:-vaked/examples/agentfield-swe.vaked}"
          out=$(mktemp -d)
          trap "rm -rf $out" EXIT
          python3 -m vakedc lower "$src" --out "$out"
          test -f "$out/gen/colmena/hive.nix" || { echo "no hosts declared — nothing to deploy"; exit 0; }
          colmena apply --config "$out/gen/colmena/hive.nix"
        ' deploy {{.CLI_ARGS}}

  slice:
    desc: 'Run the network-membrane vertical slice end to end (lower → load eBPF → enforce → testify → verify).  Usage: task slice [-- file.vaked]'
    cmds:
      - |
        {{.RUN}} bash -c '
          set -euo pipefail
          src="${1:-vaked/examples/membrane/agent-egress.vaked}"
          out=$(mktemp -d)
          python3 -m vakedc lower "$src" --out "$out"
          python3 -m agent_guardd demo "$out/gen/ebpf.policy.json" --out "$out"
        ' slice {{.CLI_ARGS}}

  otp-smoke:
    desc: 'Compile + boot the lowered OTP tree (#19 acceptance demo).  Usage: task otp-smoke -- file.vaked'
    cmds:
      - |
        {{.RUN}} bash -c '
          set -euo pipefail
          src="${1:-vaked/examples/agentfield-swe.vaked}"
          out=$(mktemp -d)
          python3 -m vakedc lower "$src" --out "$out"
          cd "$out/gen/otp"
          erlc *.erl
          sup=$(basename "$(ls ./*_sup.erl)" .erl)
          echo "== booting $sup; expect one heartbeat per child =="
          erl -noshell -eval "
            {ok, _} = ${sup}:start_link(),
            timer:sleep(6000),
            io:format(\"otp-smoke: supervisor + children alive~n\"),
            halt(0)."
        ' otp-smoke {{.CLI_ARGS}}

  build-runner:
    desc: Recompile the Amber runner (host `amber`, not the devshell).
    cmds: ['amber build tools/vaked-run.ab tools/vaked-run.sh']

  loadtests:
    desc: 'Regenerate the large load-test fixtures (1k + 10k workers; gitignored, not committed).'
    cmds:
      - '{{.RUN}} python3 examples/evaluation/generate_loadtest.py --workers 1024 --out vaked/examples/swe-swarm-1k-workers.vaked'
      - '{{.RUN}} python3 examples/evaluation/generate_loadtest.py --workers 10000 --out vaked/examples/swe-swarm-10k-workers.vaked'

  loadtests-smoke:
    desc: 'Regenerate the load-test fixtures and parse them — regression guard for the generator trailing-comma class of bug.'
    deps: [loadtests]
    cmds:
      - '{{.RUN}} python3 -m vakedc parse vaked/examples/swe-swarm-1k-workers.vaked'
      - '{{.RUN}} python3 -m vakedc parse vaked/examples/swe-swarm-10k-workers.vaked'
      - 'echo "smoke OK: both load-test fixtures parse"'

  loadtests-clean:
    desc: 'Remove the generated load-test fixtures.'
    cmds:
      - rm -f vaked/examples/swe-swarm-1k-workers.vaked vaked/examples/swe-swarm-10k-workers.vaked

  test:
    desc: Run the spec tests.
    cmds: ['{{.RUN}} python3 -m pytest tests -q']

  specdash:
    desc: Build + serve the verification dashboard.
    cmds: ['{{.RUN}} python3 tools/specdash/build.py --serve']

  # --- vaked-cli: compiled Go tool (replaces Python tools) --------------------
  cli-build:
    desc: 'Build the Go vaked-cli for the host platform.'
    cmds:
      - 'cd tools/vaked-cli && go build -o vaked-cli .'

  cli-build-linux:
    desc: 'Cross-compile vaked-cli for dev-cx53 (linux/amd64).'
    cmds:
      - 'cd tools/vaked-cli && GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o vaked-cli-linux-x86_64 .'

  cli-deploy:
    desc: 'Build + scp vaked-cli to dev-cx53.'
    cmds:
      - task: cli-build-linux
      - 'ssh dev@dev-cx53 mkdir -p /home/dev/bin'
      - 'scp tools/vaked-cli/vaked-cli-linux-x86_64 dev@dev-cx53:/home/dev/bin/vaked-cli'

  cli:
    desc: 'Run vaked-cli from repo root.  Usage: task cli -- <mlir|seal> <subcommand> [args]'
    cmds:
      - 'tools/vaked-cli/vaked-cli {{.CLI_ARGS}}'

  # --- MLIR pass pipeline (Stage-0 Python + Stage-1 build) --------------------
  passes:
    desc: 'Run the MLIR-mirror pass pipeline on a .vaked file (topology → WAL → AOT).  Usage: task passes -- file.vaked'
    cmds:
      - '{{.RUN}} python3 -m vakedc passes {{.CLI_ARGS}}'

  passes-json:
    desc: 'Same as passes but with structured JSON output.  Usage: task passes-json -- file.vaked'
    cmds:
      - '{{.RUN}} python3 -m vakedc passes --json {{.CLI_ARGS}}'

  corpus:
    desc: 'Run the 0024 differential corpus (Stage-0 determinism + pass pipeline).'
    cmds:
      - '{{.RUN}} python3 tests/corpus/0024-differential/run_corpus.py'

  mlir-check:
    desc: 'Validate .td files with mlir-tblgen (needs nix develop).  Usage: task mlir-check'
    cmds:
      - '{{.RUN}} python3 tools/vaked-mlir.py check'

  mlir-env:
    desc: 'Show MLIR toolchain versions and paths.  Usage: task mlir-env'
    cmds:
      - '{{.RUN}} python3 tools/vaked-mlir.py current-env'

  mlir-build:
    desc: 'Build Stage-1 MLIR dialect library from source (dev-cx53 only, ~5 min).  Usage: task mlir-build'
    cmds:
      - 'bash tools/build-mlir-stage1.sh'

  mlir-validate:
    desc: 'Run Stage-0 pipeline on a .vaked file and emit validated JSON.  Usage: task mlir-validate -- file.vaked'
    cmds:
      - '{{.RUN}} python3 tools/vaked-mlir.py validate {{.CLI_ARGS}}'

  # --- seal: votive seal tool (RFC 0007) ------------------------------------
  seal-sign:
    desc: 'Produce a signed votive seal.  Usage: task seal-sign -- <path> <membrane> [epoch]'
    cmds:
      - '{{.RUN}} python3 tools/vaked-seal.py sign {{.CLI_ARGS}}'

  seal-admit:
    desc: 'Validate a seal, return ADMIT/REFUSE.  Usage: task seal-admit -- provenance.json'
    cmds:
      - '{{.RUN}} python3 tools/vaked-seal.py admit {{.CLI_ARGS}}'

  seal-verify:
    desc: 'Validate a seal with verbose output.  Usage: task seal-verify -- provenance.json'
    cmds:
      - '{{.RUN}} python3 tools/vaked-seal.py verify {{.CLI_ARGS}}'

  # --- vakedz: the Zig front-end (parse → check → lower port) -----------------
  vakedz-test:
    desc: Run the vakedz Zig unit tests.
    cmds: ['{{.RUN}} bash -c "cd vakedz && zig build test"']

  vakedz-build:
    desc: Build the vakedz binary (zig-out/bin/vakedz).
    cmds: ['{{.RUN}} bash -c "cd vakedz && zig build"']

  vakedz-verify:
    desc: 'Closed-loop gate: build vakedz, then assert byte-parity with vakedc on the goldens.'
    deps: [vakedz-build]
    cmds: ['{{.RUN}} bash vakedz/test/crossverify.sh vakedz/zig-out/bin/vakedz']

  parse-zig:
    desc: 'Parse a .vaked file with the Zig front-end.  Usage: task parse-zig -- file.vaked'
    deps: [vakedz-build]
    cmds: ['{{.RUN}} bash -c "vakedz/zig-out/bin/vakedz parse {{.CLI_ARGS}} --print"']

  # --- swe_af: the lowered workflow, run on GitHub Actions ---------------------
  swe-af:
    desc: 'Build + unit-test the swe_af agent (plan/code nodes). Hermetic — no model, no GitHub writes.'
    cmds:
      - '{{.RUN}} cargo test  --manifest-path vaked-agents/ci/swe-af/Cargo.toml'
      - '{{.RUN}} cargo build --release --manifest-path vaked-agents/ci/swe-af/Cargo.toml'

  diagrams:
    desc: 'Images as code — render docs/assets/diagrams/src/*.d2 → committed *.svg (d2).'
    cmds: ['{{.RUN}} bash tools/diagrams/render.sh']

  diagrams-check:
    desc: 'Fail if any committed diagram SVG drifts from its .d2 source.'
    cmds: ['{{.RUN}} bash tools/diagrams/render.sh --check']
